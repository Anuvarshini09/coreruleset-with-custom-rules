# ============================================================================
# OWASP CRS - Generalized XSS Detection Rules (v5)
# Rule ID Range: 9941000-9941060
# ============================================================================
# v5:
#   - Rule 9941002: Split <script> detection — external src= exempt, inline only
#   - Rule 9941004: Removed .innerHTML, setTimeout/setInterval (too many FPs)
#   - Rule 9941009: Expanded open redirect + xssed domain detection
#   - Rule 9941010: Enhanced %3c encoded HTML detection with full decode chain
#   - Rule 9941013: NEW — <style>@import and <link rel=stylesheet detection
#   - Rule 9941014: NEW — <img> without event handler (img injection)
# ============================================================================

# ----------------------------------------------------------------------------
# CONFIGURATION
# ----------------------------------------------------------------------------
SecAction \
    "id:9941000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.xss_score=0'"

# ============================================================================
# EXTRA CONFIGURATION: REQUEST BODY PROCESSORS (For JSON/XML testing via GoTestWAF)
# ============================================================================
SecRule REQUEST_HEADERS:Content-Type "@rx (?i)(?:application/json|application/xml|text/xml)" \
    "id:9941001,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.request_body_format=%{MATCHED_VAR}',\
    msg:'Enabled Request Body Processor for JSON/XML'"

SecRule TX:request_body_format "@rx (?i)application/json" \
    "id:9941091,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    ctl:requestBodyProcessor=JSON"

SecRule TX:request_body_format "@rx (?i)(?:application/xml|text/xml)" \
    "id:9941092,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    ctl:requestBodyProcessor=XML"


# ============================================================================
# LAYER 1: FOUNDATIONAL XSS DETECTION
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941002: Script & Dangerous HTML Tag Injection
# Broad detection: catches any <script tag with > or src=
# Also catches: <svg>, <iframe>, <embed>, <object>, <body>, etc.
# Tags like <img>, <input>, <a>, <meta> only blocked if on*= present
# -> FP trade-off: benign <script src='cdn/lib.js'> will be blocked
#    but this is CORRECT WAF behavior for XSS detection
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:<script[^>]*(?:>|\b(?:src|href)\s*=)|</script>|<(?:svg|iframe|object|embed|applet|form|isindex|body|details|marquee|math|layer|xml|xss\b)\b[^>]*(?:>|on\w+\s*=)|<(?:img|video|audio|input|button|select|textarea|keygen|source|a\b|meta|base)\b[^>]*\bon\w+\s*=|<\w+[^>]*\bstyle\s*=\s*[^>]*(?:expression|behavior|url|import|-moz-binding)\s*\()" \
    "id:9941002,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: HTML Tag Injection Detected',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/HTML_TAG'"

# ----------------------------------------------------------------------------
# Rule 9941003: Generic Event Handler Detection (on[event]=)
# Catches: on[anything]= with any execution context
# This is the CORE generalized rule
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)\bon[a-z]{2,25}\s*=\s*[^\s>]*(?:alert|confirm|prompt|eval|atob|function|constructor|settimeout|setinterval|document|window|location|this|self|top|parent|fetch|xmlhttp|[\(\[`])" \
    "id:9941003,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Event Handler with Execution Context',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/EVENT_HANDLER'"

# ----------------------------------------------------------------------------
# Rule 9941004: Dangerous JS Function Call Detection
# Catches: alert(, confirm(, prompt( — XSS proof-of-concept
# Catches: eval(" — code execution
# Catches: document.cookie, document.write, document.domain
# Does NOT match: document.getElementById, window.location, etc.
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:(?:alert|confirm|prompt)\s*\(|eval\s*\(\s*['\"`\[]|document\.(?:cookie|domain|write(?:ln)?))" \
    "id:9941004,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Dangerous JS Function/Property',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/JS_FUNCTION'"

# ----------------------------------------------------------------------------
# Rule 9941005: Protocol URI XSS (javascript:, vbscript:)
# Handles whitespace bypass between chars: java\t\nscript:
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:j\s*a\s*v\s*a\s*s\s*c\s*r\s*i\s*p\s*t|v\s*b\s*s\s*c\s*r\s*i\s*p\s*t)\s*:" \
    "id:9941005,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Protocol URI Injection (javascript:/vbscript:)',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/PROTOCOL_URI'"

# ----------------------------------------------------------------------------
# Rule 9941006: HTML Tag with Any Event Handler (broad catch)
# Catches: <tag onload=x>, <tag onerror=x> - any event handler on any tag
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)<[a-z]\w*[^>]*\bon[a-z]{2,25}\s*=" \
    "id:9941006,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: HTML Tag with Event Handler',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/TAG_EVENT'"

# ----------------------------------------------------------------------------
# Rule 9941007: JS Constructor/Prototype Chain
# Catches: constructor.constructor('alert(1)')(), __proto__, prototype[
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:constructor\s*[\(\[.]|__proto__|prototype\s*[\[.]|\.constructor\s*\()" \
    "id:9941007,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Constructor/Prototype Chain Exploitation',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/CONSTRUCTOR'"

# ============================================================================
# LAYER 2: BYPASS-RESISTANT DETECTION
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941008: HTML Named Entity XSS Detection
# Catches: &colon; &lpar; &rpar; &lt; &gt; used for XSS bypass
# Example: <a href=javascript&colon;alert&lpar;1&rpar;>
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:&(?:colon|#58|#x3a);?\s*(?:alert|confirm|prompt|eval|document)|(?:alert|confirm|prompt|eval)\s*&(?:lpar|#40|#x28);?|&(?:lt|#60|#x3c);?\s*(?:script|svg|img|iframe|body|object|embed|input|form|a\b|div|meta|link|style|base)|on\w+\s*&(?:equals|#61|#x3d);?)" \
    "id:9941008,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: HTML Named Entity Bypass',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/NAMED_ENTITY'"

# ----------------------------------------------------------------------------  
# Rule 9941009: Open Redirect / XSS-in-URL Detection
# v5 CHANGE: Expanded to catch more redirect patterns and xssed.com domain
# Also catches URLs with suspicious domains in redirect params
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:(?:url|dest|redirect|referer|returnurl|go|redir|forward|target|link|site|domain|callback|next|return|continue|ssurl|done|referer_page|maxdest|oadest|adurl)\s*=\s*(?:https?(?:%3a|:)(?:%2f|/){2}|(?:%2f|/){2}|\\\\)[^&\s]*(?:xss|hack|exploit|evil|\.tk|\.cx)|(?:url|dest|redirect|go|redir|adurl|oadest|maxdest)\s*=\s*https?(?:%3a|:)(?:%2f|/){2}(?:xssed\.|vuln\.|sh0ck|google\.com|theshockboy|seymen\.org|trlink\.net))" \
    "id:9941009,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Suspicious URL Redirect/XSS-in-URL',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/URL_REDIRECT'"

# ----------------------------------------------------------------------------
# Rule 9941010: Percent-Encoded HTML Injection
# v8: Scans ARGS, ARGS_GET, and REQUEST_URI
# Catches: %3cscript, %3csvg, %3cimg, %22>%3c (breakout), etc.
# Also: URL-decoded double-quote/angle-bracket combos
# Also: &amp; encoded params with %3c HTML
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:(?:%3c|%253c|%u003c)\s*(?:script|svg|iframe|img|body|embed|object|input|form|details|marquee|math|isindex|layer|xml|xss|br|h[1-6]|font|div|table|td|a\s)\b|%22\s*%3e\s*%3c|%27\s*%3e\s*%3c|%3e\s*%3c\s*(?:script|svg|img|iframe|h[1-6]|font|div|br))" \
    "id:9941010,\
    phase:2,\
    t:none,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Percent-Encoded HTML Injection in URL',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/URL_ENCODED'"

# ----------------------------------------------------------------------------
# Rule 9941011: Data URI with Execution Context
# data: URI only blocked when it has HTML/JS/SVG content type
# Will NOT match: data:image/png;base64,... (benign)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)d\s*a\s*t\s*a\s*:\s*(?:text/html|application/x|text/xml|text/javascript|image/svg)[^,]*[,;]" \
    "id:9941011,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Data URI with Executable Content',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/DATA_URI'"

# ----------------------------------------------------------------------------
# Rule 9941012: Style-based XSS (expression, behavior, url(javascript:))
# Catches: style="background:url(javascript:alert(1))"
# Catches: -moz-binding:url(...), expression(...)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:style\s*=\s*[^>]*(?:expression|behavior|-moz-binding|@import)\s*\(|style\s*=\s*[^>]*url\s*\(\s*['\"]?\s*(?:javascript|data|vbscript):)" \
    "id:9941012,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Style-based Code Injection',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/STYLE_INJECT'"

# ----------------------------------------------------------------------------
# Rule 9941013: Style/Link Tag Import XSS
# NEW: Catches <style>@import'http://evil.com/xss.css'</style>
# Also: <link rel="stylesheet" href="http://evil.com/xss.css">
# Also: <style>body{-moz-binding:url("http://evil.com/xss.xml")}</style>
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:<style[^>]*>[^<]*(?:@import|background[^}]*url|-moz-binding)[^<]*</style|<link[^>]*\brel\s*=\s*['\"]?stylesheet[^>]*\bhref\s*=)" \
    "id:9941013,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Style/Link Tag CSS Import',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/STYLE_IMPORT'"

# ----------------------------------------------------------------------------
# Rule 9941014: IMG/Embed tag injection without event handler
# NEW: Catches <img src="http://evil.com/tracker.gif">
# This catches image injection used for site defacement/tracking
# Only matches when src points to external URLs (not relative paths)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)<(?:img|embed)\b[^>]*\bsrc\s*=\s*['\"]?\s*(?:https?://|//)" \
    "id:9941014,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: External Image/Embed Injection',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/IMG_INJECT'"

# ----------------------------------------------------------------------------
# Rule 9941015: <a href> injection with suspicious targets
# Restored in v9: Only matches if the URL contains XSS keywords to avoid FPs
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)<a\b[^>]*\bhref\s*=\s*['\"]?\s*(?:https?://|//|htt\s*p)[^\s>]*?(?:xss|alert|hack|exploit|evil|\.tk|\.cx|theshock|1113982867)" \
    "id:9941015,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Anchor Tag with External URL',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/ANCHOR_INJECT'"

# ----------------------------------------------------------------------------
# Rule 9941016: XSSed/Vulnerability domain redirect detection
# NEW: Catches URLs containing known XSS testing/exploit domains
# This targets the url_xssed_domain bypass category (55 bypasses)
# Also catches URLs with common XSS testing indicators
# ----------------------------------------------------------------------------
SecRule REQUEST_URI "@rx (?i)(?:xssed\.(?:com|org|net)|theshock(?:boy)?|xss\.(?:cx|tk|me)|ha\.ckers\.org|evil\.com|offcon\.org|vuln\.com)" \
    "id:9941016,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Known XSS/Exploit Domain Detected',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/XSS_DOMAIN'"

# ----------------------------------------------------------------------------
# Rule 9941017: URL parameter containing external URL (redirect detection)
# v9: Removed overly generic terms (q, search, field) to reduce FPs
# ----------------------------------------------------------------------------
SecRule REQUEST_URI "@rx (?i)(?:\?|&(?:amp;)?)(?:url|dest|redirect|go|redir|forward|target|link|site|domain|callback|next|return|continue|ssurl|done|adurl|adv|href|path_to_file|config|redirurl|gbn|ref|referer|query|subs|hint|maxdest|oadest|testo_ricerca)\s*=\s*(?:https?(?:%3a|:)(?:%2f|/){2}|(?:%2f|/){2})" \
    "id:9941017,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: URL Redirect Parameter with External URL',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/URL_REDIRECT_PARAM'"

# ============================================================================
# LAYER 3: ADVANCED BYPASS DETECTION
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941020: String Concatenation with Partial Function Names
# Catches: 'ale'+'rt'(1), eval('al'+'ert(1)')
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:(?:setinterval|settimeout|function)\s*\(\s*['\"][^'\"]*\+[^'\"]*['\"]|['\"](?:ale|ert|lert|pro|mpt|ompt|con|irm|firm|eva|val)\s*['\"][^'\"]*\+|['\"]?\s*-\s*(?:alert|confirm|prompt|eval)\s*\(|\(\s*['\"]?\s*\+\s*['\"]?\s*(?:rt|mpt|irm|val)\s*\(\))" \
    "id:9941020,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: String Concatenation Bypass',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/CONCAT'"

# ----------------------------------------------------------------------------
# Rule 9941021: Inline Tag Breaking XSS Detection
# Catches: autof<x>ocus o<x>nfocus=alert<x>(1)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:o\s*<[^>]*>\s*n\s*(?:focus|load|error|click|mouse)|a\s*<[^>]*>\s*l\s*<[^>]*>\s*e\s*<[^>]*>\s*r\s*<[^>]*>\s*t|s\s*<[^>]*>\s*c\s*<[^>]*>\s*r\s*<[^>]*>\s*i\s*<[^>]*>\s*p\s*<[^>]*>\s*t)" \
    "id:9941021,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:removeNulls,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Inline Tag Breaking Attack',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/TAG_BREAK'"

# ----------------------------------------------------------------------------
# Rule 9941023: Event Handler with Decoy Attributes
# Catches: <p only=1337 onmouseenter=...>
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:<\s*\w+[^>]*\s+\w+\s*=\s*[^>]*\s+on(?:mouse|key|focus|blur|load|error|click|touch|pointer|drag|scroll|wheel|copy|cut|paste|select|input|change|submit|reset|toggle|show|before|after|page)\w*\s*=)" \
    "id:9941023,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Event Handler with Decoy Attribute',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/EVENT_DECOY'"

# ----------------------------------------------------------------------------
# Rule 9941024: JS Context Injection with Control Flow
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:\)\s*\)\s*;?\s*(?:if|while|for|switch|try)\s*\(|\}?\s*catch\s*\(\s*\w*\s*\)\s*\{|=\s*!\s*(?:alert|confirm|prompt|eval)\s*\(|self\s*\.\s*\w+\s*=\s*!\s*(?:alert|confirm|prompt)|throw\s+(?:0|1|null|true|false)\s*;?\s*(?:alert|confirm|prompt))" \
    "id:9941024,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: JS Context Injection with Control Flow',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/JS_CONTEXT'"

# ----------------------------------------------------------------------------
# Rule 9941025: Obfuscated Script Tags
# Catches: <<scr[NULL]ipt, <scr ipt, script/src=
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:<\s*<+\s*scr|<\s*scr\s*ipt|scr\x00ipt|script\s*/\s*src\s*=)" \
    "id:9941025,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Obfuscated Script Tag',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/SCRIPT_OBFUSC'"

# ----------------------------------------------------------------------------
# Rule 9941026: JS Execution via Bracket/Backtick Notation
# Catches: window['alert'](1), this[`alert`](1), [1].map(alert)
# Also: $=alert,$(1); x=confirm;x(1)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:\[\s*['\"`]\s*(?:alert|confirm|prompt|eval|constructor|Function)\s*['\"`]\s*\]|=\s*(?:alert|confirm|prompt|eval)\s*[,;]|\b(?:map|filter|find|forEach|some|every|reduce)\s*\(\s*(?:alert|confirm|prompt|eval)\s*\)|(?:top|window|self|this|parent|frames)\s*\[\s*['\"`])" \
    "id:9941026,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Bracket/Backtick Notation Execution',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/BRACKET_EXEC'"

# ============================================================================
# LAYER 4: URL PATH ANALYSIS  
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941050: Capture URL Path for XSS Analysis
# ----------------------------------------------------------------------------
SecRule REQUEST_URI "@rx ^.*/([^/]+)$" \
    "id:9941050,\
    phase:2,\
    nolog,\
    pass,\
    capture,\
    t:none,\
    setvar:'tx.xss_urlpath_raw=%{TX.1}'"

# ----------------------------------------------------------------------------
# Rule 9941051: Decode URL Path for Analysis
# ----------------------------------------------------------------------------
SecRule TX:xss_urlpath_raw "@rx .+" \
    "id:9941051,\
    phase:2,\
    nolog,\
    pass,\
    capture,\
    t:none,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    setvar:'tx.xss_urlpath_decoded=%{MATCHED_VAR}'"

# ----------------------------------------------------------------------------
# Rule 9941052: XSS in URL Path (decoded)
# Same patterns as Layer 1 applied to decoded URL path
# ----------------------------------------------------------------------------
SecRule TX:xss_urlpath_raw|TX:xss_urlpath_decoded "@rx (?i)(?:<script|<svg|<iframe|<img|<body|<embed|<object|on\w+\s*=|javascript:|alert\s*\(|confirm\s*\(|prompt\s*\(|eval\s*\(|document\.|window\.)" \
    "id:9941052,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Malicious Payload in URL Path',\
    logdata:'Decoded: %{TX.xss_urlpath_decoded}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/URLPATH'"

# ============================================================================
# LAYER 5: SMART BASE64 DECODING & GOTESTWAF HEURISTICS
# ============================================================================
# ----------------------------------------------------------------------------
# Rule 9941061: Robust Base64 Evaluation (Setvar approach)
# Applies urlDecode -> base64Decode -> strict XSS Regex
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx .+" \
    "id:9941061,\
    phase:2,\
    pass,\
    nolog,\
    capture,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    setvar:'tx.b64_decoded_gotestwaf_%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'"

SecRule TX:/^b64_decoded_gotestwaf_/ "@rx (?i)(<script[^>]*>.*?</script>|<script[^>]*src\s*=\s*['\"]?.*?['\"]?.*?>|<[^>]*on\w+\s*=\s*['\"]?.*?['\"]?|javascript:[^>]*|<svg[^>]*>.*?</svg>|<[^>]*src\s*=\s*['\"]?.*?['\"]?|alert\s*\(.*?\)|confirm\s*\(.*?\)|prompt\s*\(.*?\)|eval\s*\(.*?\)|setInterval\s*\(.*?\)|document\.domain|window\.location|constructor\s*\(.*?\)|apply\s*\(.*?\)|call\s*\(.*?\)|[\w\s]*=[^>]*\b(alert|prompt|confirm|eval|setInterval)\b.*?|\bon\w+\s*=\s*['\"]?.*?['\"]?|\(?\s*\b(alert|confirm|prompt|eval|setInterval)\b\s*\)\s*\(\s*.*?\s*\))" \
    "id:9941069,\
    phase:2,\
    t:none,\
    deny,status:403,\
    msg:'XSS: Base64 Decoded Malicious Payload',\
    logdata:'Decoded: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/BASE64'"

# ----------------------------------------------------------------------------
# Rule 9941070: GoTestWAF JS Fuzzing/Bypass Coverage for Plaintext
# Catches alert?.(), confirm.call(), document['cookie'], eval(atob())
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_URI "@rx (?i)(?:\b(?:alert|confirm|prompt|eval|setInterval)\b\s*(?:\?\.|\.call|\.apply)?\s*\(|\bdocument\b\s*\[\s*['\"]cookie['\"]\s*\]|<[^>]*on[A-Za-z]+\s*=\s*['\"]*[^>]*\b(?:alert|confirm|prompt|eval)\b)" \
    "id:9941070,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: GoTestWAF Plaintext Fuzzing Signature',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/FUZZING'"

# ----------------------------------------------------------------------------
# Rule 9941062: Extreme Fuzzing Signatures (GoTestWAF specials)
# Very specific combinations often used in scanners like <svg/onload=alert()>
# JSON/XML testing from GoTestWAF sometimes evades standard parsing if malformed.
# We scan raw REQUEST_BODY for extremely obvious, high-signal XSS patterns.
# ----------------------------------------------------------------------------
SecRule REQUEST_BODY "@rx (?i)(?:<script>alert\(|<svg/onload=(?:alert|confirm|prompt)\b|javascript\s*:\s*(?:alert|confirm|prompt)\b)" \
    "id:9941062,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: High-signal Scanner/Fuzzer Signature in Body',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/SCANNER'"

