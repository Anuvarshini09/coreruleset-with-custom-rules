# ============================================================================
# XSS GENERALIZED RULE BASE v2
# Rule ID Range: 9942000-9942099
# Architecture: 5-Layer Defense with Anomaly Scoring + Context-Awareness
# 
# TRIẾT LÝ THIẾT KẾ:
#   - Chỉ chặn khi có dấu hiệu THỰC THI (execution context), không chỉ có thẻ HTML đơn thuần
#   - Không scan REQUEST_HEADERS:User-Agent (quá nhiều FP)
#   - Decode chain đầy đủ trước mọi match
#   - Severity tỉ lệ với mức nguy hiểm thực tế
# ============================================================================

SecAction \
    "id:9942000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.xss_score_v2=0'"

# ============================================================================
# LỚP 1: CORE XSS - Tín hiệu tuyệt đối (CRITICAL = 5 điểm)
# Chỉ bắt khi có KẾT HỢP thẻ HTML + ngữ cảnh thực thi
# ============================================================================

# Rule 9942001: <script> với nội dung thực thi rõ ràng trong ARGS (không phải URL tĩnh)
# Constraint: Chỉ bắt khi script tag có inline execution, không bắt <script src=cdn>
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:<script[^>]*>\s*(?:alert|confirm|prompt|eval|document\.(?:write|cookie)|window\.|fetch\s*\(|location[\s=]|innerHTML|atob\s*\(|setTimeout|setInterval))|(?:<script[^>]*>[^<]{0,200}</script>)" \
    "id:9942001,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L1: Script tag with execution context',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/SCRIPT_EXEC'"

# Rule 9942002: Event handler với execution context (không phải bất kỳ on* nào)
# Chỉ bắt khi on[event]= có GIÁ TRỊ thực thi ngay sau
# R4: Thêm onauxclick, [].some/find/filter(alert) array callback patterns
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:\bon[a-z]{2,25}\s*=\s*(?:['\"]?\s*(?:alert|confirm|prompt|eval|fetch|location|document\.|window\.|Function\s*\(|setTimeout|setInterval|XMLHttp|innerHTML|outerHTML|atob\s*\(|btoa\s*\(|this\[|self\[|top\[|parent\[|\[\d*\]\.(?:some|find|filter|map|forEach|reduce|every)\s*\()))|\bon[a-z]{2,25}\s*=\s*\[\d*\]\.(?:some|find|filter|map|forEach|reduce|every)\s*\(\s*(?:alert|confirm|prompt|eval))" \
    "id:9942002,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L1: Event handler with execution context',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/EVENT_EXEC'"

# Rule 9942003: javascript: / vbscript: URI scheme (bypass via spacing)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:j[\s\x00-\x1f]*a[\s\x00-\x1f]*v[\s\x00-\x1f]*a[\s\x00-\x1f]*s[\s\x00-\x1f]*c[\s\x00-\x1f]*r[\s\x00-\x1f]*i[\s\x00-\x1f]*p[\s\x00-\x1f]*t|v[\s\x00-\x1f]*b[\s\x00-\x1f]*s[\s\x00-\x1f]*c[\s\x00-\x1f]*r[\s\x00-\x1f]*i[\s\x00-\x1f]*p[\s\x00-\x1f]*t)[\s\x00-\x1f]*:" \
    "id:9942003,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L1: Protocol URI injection (javascript:/vbscript:)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/PROTOCOL_URI'"

# Rule 9942004: Dangerous JS functions trong ARGS với kết hợp nguy hiểm
# R4b: Thêm bắt alert(identifier) - alert(xss), alert(r=document.cookie)
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:(?:alert|confirm|prompt)\s*\(\s*(?:document\.|window\.|location\.|\d+\s*\)|'[^']*'\s*\)|\"[^\"]*\"\s*\)|/[^/]*/\s*\)|[a-z_][a-z0-9_.]*\s*\))|eval\s*\(\s*(?:atob\s*\(|unescape\s*\(|String\.fromCharCode|document\.|window\.|location)|document\.(?:cookie|domain|location)\s*[=+]|confirm\?\s*\.?\s*\(\s*document)" \
    "id:9942004,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L1: Dangerous JS function call',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/JS_FUNCTION'"

# ============================================================================
# LỚP 2: STRUCTURAL INJECTION - HTML tags + execution triggers (CRITICAL)
# ============================================================================

# Rule 9942010: SVG/MathML/Detail/Video tags với event handler
# R4b: Thêm video|audio|source|x|lol|d3 (tên tuỳ chỉnh)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)<(?:svg|math|details|summary|marquee|video|audio|source|x|lol|d3|input|select|textarea|isindex)\b[^>]*\bon[a-z]{2,25}\s*=" \
    "id:9942010,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L2: SVG/MathML tag with event handler',\
