# ============================================================================
# LỚP 3: ENCODED / OBFUSCATED XSS (ERROR = 4 điểm)
# ============================================================================

# Rule 9942020: Double/triple URL-encoded HTML tags
# R4c: Thêm %2522%253E (triple-encoded " and >) + %253Cscript%253E
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI \
    "@rx (?i)(?:%253[Cc]|%25253[Cc]|%2525253[Cc]|\\\\x3c|\\\\u003c)(?:%[0-9a-f]{2}|\\\\x[0-9a-f]{2}|\\\\u[0-9a-f]{4}|[a-z0-9%])*(?:script|svg|iframe|img\b|body\b|embed|object)" \
    "id:9942020,\
    phase:2,\
    t:none,\
    t:lowercase,\
    block,\
    msg:'XSS-v2 L3: Double/triple URL-encoded HTML injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/DOUBLE_ENCODE'"

# Rule 9942021: HTML entity bypass
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:&(?:lt|#60|#x3c);?\s*script|&(?:lt|#60|#x3c);?\s*(?:svg|iframe|img|body|embed)\b|on\w+\s*=\s*&(?:quot|#34|#x22);?|&(?:colon|#58|#x3a);?\s*(?:alert|eval|javascript))" \
    "id:9942021,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L3: HTML entity encoding bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
