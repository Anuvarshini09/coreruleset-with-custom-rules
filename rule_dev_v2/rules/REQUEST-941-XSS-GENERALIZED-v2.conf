    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/OPEN_REDIRECT'"

# Rule 9942044: HTML Entity + SVG/Event Handler bypass (entity encoded attack)
# Bắt: &lt;svg/onload&equals;alert(1)&gt; / "onMouSeoVer=prompt
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:&(?:lt|#60|#x3[Cc]);\s*(?:svg|img|body|iframe|script)|on(?:mouseover|mouseenter|focus|error|load|click)\s*=\s*(?:prompt|alert|confirm|eval)|&(?:equals|#61|#x3[Dd]);\s*(?:alert|confirm|prompt|eval)|&(?:colon|#58|#x3[Aa]);\s*(?:alert|javascript))" \
