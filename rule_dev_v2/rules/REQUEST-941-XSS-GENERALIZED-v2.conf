# Rule 9942043: Open Redirect XSS - URL pattern với XSS payload
# Mereani/DMOZ: URL chứa xssed.com, alert(), hoặc redirect tới external domain
SecRule REQUEST_URI|REQUEST_BODY \
    "@rx (?i)(?:(?:^|[?&;=/\s])(?:href|callback|redirect|url|next|goto|target|returnUrl|return_url|redir|dest|forward|destination|go|r)\s*=\s*(?:https?://(?!(?:[\w-]+\.)?(?:google|facebook|twitter|github|localhost|127\.0\.0\.1))[\w./-]+)|(?:callback|url)=[^&]*(?:<script|javascript:|onerror=|onload=))" \
