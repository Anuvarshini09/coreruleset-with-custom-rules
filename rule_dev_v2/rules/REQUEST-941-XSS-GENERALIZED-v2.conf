    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/ENTITY_BYPASS'"

# Rule 9942022: Detect Base64 payload in ARGS then decode-and-check
# Bắt pattern base64 dài, decode và kiểm tra XSS trong kết quả
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?:^|[?&=])([A-Za-z0-9+/]{20,}={0,2})(?:[&\s]|$)" \
    "id:9942022,\
    phase:2,\
    pass,\
    nolog,\
    capture,\
    t:none,\
    t:urlDecodeUni,\
    setvar:'tx.b64_candidate=%{TX.1}'"

SecRule TX:b64_candidate \
    "@rx ^[A-Za-z0-9+/]{20,}={0,2}$" \
    "id:9942023,\
    phase:2,\
    pass,\
    nolog,\
    capture,\
    t:none,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    setvar:'tx.b64_decoded=%{MATCHED_VAR}'"

SecRule TX:b64_decoded \
    "@rx (?i)(?:<(?:script|img|body|svg|iframe|object)\b[^>]*(?:>|on\w+=)|on(?:error|load|click|mouseover|focus|mouse)\s*=\s*(?:alert|confirm|prompt|eval|document)|javascript:\s*(?:alert|set(?:Timeout|Interval)|eval)|alert\s*\(|confirm\s*\(|prompt\s*\()" \
    "id:9942025,\
    phase:2,\
    t:none,\
    block,\
    msg:'XSS-v2 L3: Base64-decoded XSS payload',\
    logdata:'Decoded content: %{TX.b64_decoded}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/BASE64'"

# Rule 9942024: String concatenation bypass ('ale'+'rt')
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:['\"`](?:ale|ert|lert|pro|mpt|ompt|con|irm|firm|eva|val)['\"`]\s*\+\s*['\"`]|['\"`]\s*\+\s*['\"`](?:rt|mpt|irm)\s*['\"`]|(?:Function|eval)\s*\(\s*['\"`][^'\"`]*['\"`]\s*\+)" \
    "id:9942024,\
