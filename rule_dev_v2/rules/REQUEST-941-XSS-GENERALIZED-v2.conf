# Rule 9942110: URL path chứa chuỗi từ khóa XSS mở rộng (pwn/xss/hack starter)
# Bắt /pwnscriptalert..., /textareascriptalert..., script-alert-document-cookie
SecRule REQUEST_URI|ARGS \
    "@rx (?i)(?:[/_-]|^)(?:pwn|xss|hack|hacked|hi-x|defaced|fuck|midis|textarea)(?:script|alert|prompt|confirm|eval|cookie|document|window|location|iframe|svg|onload|onerror)(?:[a-z]*)(?:[-_]?(?:script|alert|prompt|confirm|eval|cookie|document|window|location|iframe|svg|onload|onerror|pwn|xss|hack)){1,}" \
