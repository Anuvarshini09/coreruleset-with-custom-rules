# ============================================================================
# XSS GENERALIZED RULE BASE v2
# Rule ID Range: 9942000-9942199
# Kiến trúc: 5-Layer Defense kết hợp Anomaly Scoring + Context-Awareness
#
# TRIẾT LÝ THIẾT KẾ:
#   - Chỉ chặn khi có dấu hiệu THỰC THI (execution context), không chỉ thẻ HTML
#   - Decode chain đầy đủ trước mọi match
#   - Severity tỉ lệ với mức nguy hiểm thực tế
#
# Architecture 5 layer :
#   L1 - CORE XSS:               Script tag / Event handler / JS function (CRITICAL)
#   L2 - STRUCTURAL INJECTION:   SVG/MathML/Iframe + execution trigger (CRITICAL)
#   L3 - ENCODED & OBFUSCATED:   Double-encode / HTML entity / Base64 / CSS @import (ERROR)
#   L4 - DOM & CONTEXT BREAK-OUT: DOM sink / Bracket / Template literal / Tag signal (WARNING)
#   L5 - HEURISTIC & MULTI-VEC:  Base64 / URI backstop / Recall booster / WAF bypass (NOTICE/CRITICAL)
# ============================================================================

SecAction \
    "id:9942000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.xss_score_v2=0'"

# ============================================================================
# LỚP 1: CORE XSS - Tín hiệu thực thi tuyệt đối (CRITICAL)
# Chỉ chặn khi kết hợp thẻ HTML + ngữ cảnh thực thi rõ ràng.
# Tránh chặn <script src=cdn> tĩnh hay text bình thường có chứa từ "alert".
# ============================================================================

# Rule 9942001: Script tag chứa nội dung thực thi rõ ràng trong ARGS
# Constraint: Chỉ bắt khi script tag có inline execution, không bắt <script src=cdn>
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:<script[^>]*>\s*(?:alert|confirm|prompt|eval|document\.(?:write|cookie)|window\.|fetch\s*\(|location[\s=]|innerHTML|atob\s*\(|setTimeout|setInterval))|(?:<script[^>]*>[^<]{0,200}</script>)" \
    "id:9942001,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L1: Script tag with execution context',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/SCRIPT_EXEC'"

# Rule 9942002: Event handler có giá trị thực thi ngay sau (on*=alert/eval/document.cookie...)
# Bao gồm onauxclick và array callback [].some/find/filter(alert)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:\bon[a-z]{2,25}\s*=\s*(?:['\"]?\s*(?:alert|confirm|prompt|eval|fetch|location|document\.|window\.|Function\s*\(|setTimeout|setInterval|XMLHttp|innerHTML|outerHTML|atob\s*\(|btoa\s*\(|this\[|self\[|top\[|parent\[|\[\d*\]\.(?:some|find|filter|map|forEach|reduce|every)\s*\()))|\bon[a-z]{2,25}\s*=\s*\[\d*\]\.(?:some|find|filter|map|forEach|reduce|every)\s*\(\s*(?:alert|confirm|prompt|eval))" \
    "id:9942002,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L1: Event handler with execution context',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/EVENT_EXEC'"

# Rule 9942003: javascript: / vbscript: URI scheme (bypass qua spacing/null byte)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:j[\s\x00-\x1f]*a[\s\x00-\x1f]*v[\s\x00-\x1f]*a[\s\x00-\x1f]*s[\s\x00-\x1f]*c[\s\x00-\x1f]*r[\s\x00-\x1f]*i[\s\x00-\x1f]*p[\s\x00-\x1f]*t|v[\s\x00-\x1f]*b[\s\x00-\x1f]*s[\s\x00-\x1f]*c[\s\x00-\x1f]*r[\s\x00-\x1f]*i[\s\x00-\x1f]*p[\s\x00-\x1f]*t)[\s\x00-\x1f]*:" \
    "id:9942003,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L1: Protocol URI injection (javascript:/vbscript:)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/PROTOCOL_URI'"

# Rule 9942004: Hàm JS nguy hiểm kết hợp đối số nguy hiểm
# Bao gồm alert(identifier) - alert(xss), alert(r=document.cookie)
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:(?:alert|confirm|prompt)\s*\(\s*(?:document\.|window\.|location\.|\d+\s*\)|'[^']*'\s*\)|\"[^\"]*\"\s*\)|/[^/]*/\s*\)|[a-z_][a-z0-9_.]*\s*\))|eval\s*\(\s*(?:atob\s*\(|unescape\s*\(|String\.fromCharCode|document\.|window\.|location)|document\.(?:cookie|domain|location)\s*[=+]|confirm\?\s*\.?\s*\(\s*document)" \
    "id:9942004,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L1: Dangerous JS function call',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/JS_FUNCTION'"

# ============================================================================
# LỚP 2: STRUCTURAL INJECTION - Thẻ HTML + execution trigger (CRITICAL)
# Bắt SVG/MathML/Iframe/Object/Style/Data-URI có kết hợp event handler hoặc
# src đáng ngờ, kèm SVG/SMIL namespace nâng cao.
# ============================================================================

# Rule 9942010: SVG/MathML/Details/Video tags kèm event handler
# Bao gồm video|audio|source|x|lol|d3 (tên tag tuỳ chỉnh)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)<(?:svg|math|details|summary|marquee|video|audio|source|x|lol|d3|input|select|textarea|isindex)\b[^>]*\bon[a-z]{2,25}\s*=" \
    "id:9942010,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L2: SVG/MathML tag with event handler',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/SVG_EVENT'"

# Rule 9942011: iframe/object/embed kèm src/data đáng ngờ (loại trừ CDN whitelist)
# Bao gồm <iframesrc= và <scriptsrc= (không space) - kỹ thuật né WAF
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:<(?:iframe|object|embed|applet)\b[^>]*\b(?:src|data|code)\s*=\s*['\"]?\s*(?:javascript:|data:|vbscript:|//[^/]|https?://(?!(?:www\.|cdn\.|static\.|assets\.)))|<(?:iframe|script)src\s*=\s*['\"]?\s*(?:javascript:|data:|https?://))" \
    "id:9942011,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L2: Iframe/Object/Embed with suspicious src',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/IFRAME_SRC'"

# Rule 9942012: Style attribute kèm execution context (expression, behavior, -moz-binding)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)style\s*=\s*[^>]*(?:expression\s*\(|behavior\s*:|url\s*\(\s*['\"]?\s*(?:javascript:|data:text/html|vbscript:)|-moz-binding\s*:)" \
    "id:9942012,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L2: Style injection with execution context',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/STYLE_EXEC'"

# Rule 9942013: data: URI với content type thực thi (text/html, text/javascript, svg+xml)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)data\s*:\s*(?:text/html|text/javascript|application/x-javascript|image/svg\+xml)[^,]*," \
    "id:9942013,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L2: Data URI with executable content type',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/DATA_URI'"

# Rule 9942082: SVG/SMIL namespace nâng cao + filter/animation tag kèm thuộc tính thực thi
# Bao gồm <feImage href=javascript:..>, <set attributeName=onload>, <animate onbegin=alert(1)>,
# <svg:svg onload=..>, <foreignObject>, v.v.
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)<(?:svg:)?(?:feimage|fescript|set|animate(?:transform|motion|color)?|foreignobject|use\b|altglyph|cursor|filter\b|clippath|mask\b|symbol\b|lineargradient|radialgradient)\b[^>]*\b(?:href|xlink:href|attributename|values|onbegin|onend|onrepeat|onload|onclick|onfocus)\s*=" \
    "id:9942082,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L2: SVG/SMIL filter/animation tag with executable attribute',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/SVG_SMIL'"

# ============================================================================
# LỚP 3: ENCODED & OBFUSCATED XSS (ERROR)
# Bắt double/triple URL-encoding, HTML entity bypass, Base64 payload trong ARGS,
# string concatenation và CSS @import dangerous URI.
# ============================================================================

# Rule 9942020: Double/triple URL-encoded HTML tag
# Bao gồm %2522%253E (triple-encoded " and >) và %253Cscript%253E
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI \
    "@rx (?i)(?:%253[Cc]|%25253[Cc]|%2525253[Cc]|\\\\x3c|\\\\u003c)(?:%[0-9a-f]{2}|\\\\x[0-9a-f]{2}|\\\\u[0-9a-f]{4}|[a-z0-9%])*(?:script|svg|iframe|img\b|body\b|embed|object)" \
    "id:9942020,\
    phase:2,\
    t:none,\
    t:lowercase,\
    block,\
    msg:'XSS-v2 L3: Double/triple URL-encoded HTML injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/DOUBLE_ENCODE'"

# Rule 9942021: HTML entity bypass (&lt;script, &colon;alert, ...)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:&(?:lt|#60|#x3c);?\s*script|&(?:lt|#60|#x3c);?\s*(?:svg|iframe|img|body|embed)\b|on\w+\s*=\s*&(?:quot|#34|#x22);?|&(?:colon|#58|#x3a);?\s*(?:alert|eval|javascript))" \
    "id:9942021,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L3: HTML entity encoding bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/ENTITY_BYPASS'"

# Rule 9942022 + 9942023 + 9942025: Cặp detect-decode-check Base64 trong ARGS
# Bước 1 (9942022): nhận diện pattern Base64 dài (>=20 ký tự), capture vào tx.b64_candidate
# Bước 2 (9942023): decode Base64 + htmlEntity + jsDecode, lưu vào tx.b64_decoded
# Bước 3 (9942025): kiểm tra nội dung đã decode có pattern XSS thực thi không
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?:^|[?&=])([A-Za-z0-9+/]{20,}={0,2})(?:[&\s]|$)" \
    "id:9942022,\
    phase:2,\
    pass,\
    nolog,\
    capture,\
    t:none,\
    t:urlDecodeUni,\
    setvar:'tx.b64_candidate=%{TX.1}'"

SecRule TX:b64_candidate \
    "@rx ^[A-Za-z0-9+/]{20,}={0,2}$" \
    "id:9942023,\
    phase:2,\
    pass,\
    nolog,\
    capture,\
    t:none,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    setvar:'tx.b64_decoded=%{MATCHED_VAR}'"

SecRule TX:b64_decoded \
    "@rx (?i)(?:<(?:script|img|body|svg|iframe|object)\b[^>]*(?:>|on\w+=)|on(?:error|load|click|mouseover|focus|mouse)\s*=\s*(?:alert|confirm|prompt|eval|document)|javascript:\s*(?:alert|set(?:Timeout|Interval)|eval)|alert\s*\(|confirm\s*\(|prompt\s*\()" \
    "id:9942025,\
    phase:2,\
    t:none,\
    block,\
    msg:'XSS-v2 L3: Base64-decoded XSS payload',\
    logdata:'Decoded content: %{TX.b64_decoded}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/BASE64'"

# Rule 9942024: String concatenation bypass ('ale'+'rt')
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:['\"`](?:ale|ert|lert|pro|mpt|ompt|con|irm|firm|eva|val)['\"`]\s*\+\s*['\"`]|['\"`]\s*\+\s*['\"`](?:rt|mpt|irm)\s*['\"`]|(?:Function|eval)\s*\(\s*['\"`][^'\"`]*['\"`]\s*\+)" \
    "id:9942024,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L3: String concatenation bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/STR_CONCAT'"

# Rule 9942084: CSS @import / @font-face / @charset với URI scheme nguy hiểm
# Bao gồm: @import 'javascript:..' / @font-face url(data:) / @import url(vbscript:)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)@(?:import|font-face|charset|namespace)\b[^;{]{0,100}(?:javascript:|data:text/|vbscript:|expression\s*\()" \
    "id:9942084,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L3: CSS @import/@font-face with dangerous URI scheme',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.xss_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/CSS_AT_INJECT'"

# ============================================================================
# LỚP 4: DOM MANIPULATION & CONTEXT BREAK-OUT (WARNING + tín hiệu phụ trợ)
# Bắt thao tác DOM nguy hiểm, bracket notation, template literal có thực thi,
# tín hiệu thẻ HTML lạ (signal rule cộng dồn), URL parameter break-out,
# JS context break-out, Unicode bidi obfuscation.
# ============================================================================

# Rule 9942030: Thao tác DOM kèm gán nội dung HTML
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:(?:inner|outer)HTML\s*[+]?=\s*['\"`]?<|document\.(?:write|writeln)\s*\(\s*['\"`]?<|\.(?:innerHTML|outerHTML|insertAdjacentHTML)\s*=\s*['\"`]?(?:<script|javascript:|on\w+=))" \
    "id:9942030,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L4: DOM manipulation with HTML injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:WARNING,\
    setvar:'tx.xss_score_v2=+%{tx.warning_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.warning_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/DOM_MANIP'"

# Rule 9942031: Bracket notation để gọi hàm (window['eval'], top['alert'], ...)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:(?:window|top|self|this|parent|frames|globalThis)\s*\[\s*['\"`]\s*(?:alert|confirm|prompt|eval|location|document)\s*['\"`]\s*\]|=\s*(?:alert|confirm|prompt|eval)\s*[,;])" \
    "id:9942031,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L4: Bracket notation execution bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:WARNING,\
    setvar:'tx.xss_score_v2=+%{tx.warning_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.warning_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/BRACKET_EXEC'"

# Rule 9942032: Template literal có execution context (`${alert(...)}`)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:`\$\{[^}]*(?:alert|eval|confirm|prompt|document\.|location)[^}]*\}`|Function\s*`[^`]*`)" \
    "id:9942032,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:jsDecode,\
    t:removeNulls,\
    block,\
    msg:'XSS-v2 L4: Template literal with execution context',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:WARNING,\
    setvar:'tx.xss_score_v2=+%{tx.warning_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.warning_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/TEMPLATE_LITERAL'"

# Rule 9942055: SIGNAL - sự xuất hiện của thẻ HTML nguy hiểm (NOTICE +2, không tự block)
# Không tự đạt threshold 5, nhưng cộng dồn với rule khác (9942001, 9942099, 9942004) sẽ block
SecRule ARGS|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY|REQUEST_URI \
    "@rx (?i)(?:(?:<|%(?:3C|3c)|&(?:lt|#60|#x0*3c);)\s*(?:script|iframe|object|embed|marquee|base|applet|meta)[>\s/]|<(?:iframe|script|meta)(?:src|http-equiv)\s*=)" \
    "id:9942055,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    pass,\
    msg:'XSS-v2 L4 SIGNAL: dangerous HTML tag present (+2)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:NOTICE,\
    setvar:'tx.xss_score_v2=+%{tx.notice_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.notice_anomaly_score}',\
