    tag:'OWASP_CRS/XSS-v2/STYLE_EXEC'"

# Rule 9942013: data: URI với HTML/JS content type
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)data\s*:\s*(?:text/html|text/javascript|application/x-javascript|image/svg\+xml)[^,]*," \
