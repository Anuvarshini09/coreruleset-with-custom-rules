    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/SVG_EVENT'"

# Rule 9942011: iframe/object/embed với src/data attribute (NOT whitelist CDN)
# R4: Thêm bắt <iframesrc= (no space) và <scriptsrc= (no space)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:<(?:iframe|object|embed|applet)\b[^>]*\b(?:src|data|code)\s*=\s*['\"]?\s*(?:javascript:|data:|vbscript:|//[^/]|https?://(?!(?:www\.|cdn\.|static\.|assets\.)))|<(?:iframe|script)src\s*=\s*['\"]?\s*(?:javascript:|data:|https?://))" \
    "id:9942011,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'XSS-v2 L2: Iframe/Object/Embed with suspicious src',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.xss_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS-v2/IFRAME_SRC'"

