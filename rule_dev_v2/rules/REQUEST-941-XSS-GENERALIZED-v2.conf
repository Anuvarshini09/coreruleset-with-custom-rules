SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)style\s*=\s*[^>]*(?:expression\s*\(|behavior\s*:|url\s*\(\s*['\"]?\s*(?:javascript:|data:text/html|vbscript:)|-moz-binding\s*:)" \
