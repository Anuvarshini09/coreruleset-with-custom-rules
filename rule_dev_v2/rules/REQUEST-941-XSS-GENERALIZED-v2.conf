    tag:'OWASP_CRS/XSS-v2/URL_KEYWORD_EXT'"

# Rule 9942111: %22%3e... break-out + nội dung trong query (recover URL-encoded breakout)
# `?param=%22%3e...` sau urlDecodeUni = `?param=">..."` - khả năng cao là payload XSS
SecRule ARGS|REQUEST_URI \
    "@rx (?i)(?:\?|&amp;|&)[a-z_][a-z0-9_-]{0,30}\s*=\s*['\"]?(?:%22%3[eE]|%27%3[eE]|\"\>|'\>|&quot;&gt;|&#x?22&#x?3e)" \
