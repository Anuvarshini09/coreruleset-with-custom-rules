# Rule 9943040: OS command qua stored procedure SQL (xp_cmdshell, etc.)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\b(?:xp_cmdshell\s*\(|sp_executesql\s*\(|exec\s*(?:master|xp_|sp_)\w+|openrowset\s*\(\s*'SQLOLEDB'|sp_oacreate|sp_oamethod|execute\s+as\s+(?:user|login))" \
