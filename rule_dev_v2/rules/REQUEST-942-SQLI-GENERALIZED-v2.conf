# ============================================================================
# PATCH SET: SHORT-PROBE SQLI DETECTION
# Targets sqli-patt-sqli bypasses: minimal probes, smart-quote variants,
# tautology patterns, quote+comment injections.
# Rule ID: 9943070-9943079
# ============================================================================

# Rule 9943070: Quote immediately followed by SQL comment terminator
# Covers: '#  '/*  '-- " -- " # (stripped to bare quote+comment)
# Very high confidence: quote+comment at start/end of value = auth bypass probe.
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:^|[\s=&,])['\"`]\s*(?:--|#|/\*)\s*(?:$|[\s\-#])" \
    "id:9943070,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 short-probe: quote + SQL comment terminator',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/QUOTE_COMMENT'"

# Rule 9943071: Quote-empty-string-tautology sandwich
# Covers: ' or ''-'  ' or '' '  ' or ''*'  " or ""&"  (char-based tautologies)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)['\"`]\s*(?:or|and)\s*['\"`]{2,}[-+&*^'\x20\t]" \
    "id:9943071,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 short-probe: quote-empty-string tautology',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/EMPTY_STR_TAUTOLOGY'"

# Rule 9943072: Nested-paren boolean auth bypass
# Covers: ') or ('x')=('x  ')) or (('x'))=(('x  ") or ("x")=("x
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\)+\s*or\s*\(+['\x22`][^'\x22`\r\n]{0,30}['\x22`]\)+\s*=\s*\(+['\x22`][^'\x22`\r\n]{0,30}['\x22`]" \
    "id:9943072,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 short-probe: nested-paren boolean auth bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/NESTED_PAREN_BYPASS'"

# Rule 9943073: No-space quote-keyword concatenation + simple tautologies
# Covers: 'or'1=1  'or'1=1'  or true  or false  like '%'  or 0=0
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:['\x22`]or['\x22`]\d+\s*=\s*\d+|\bor\s+(?:true|false|null)\s*(?:$|\s|--|#)|\blike\s+['\x22`]%['\x22`]\s*(?:$|\s|--|#)|\bor\s+0\s*=\s*0\b|\band\s+1\s*=\s*1\b)" \
    "id:9943073,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 short-probe: no-space tautology / simple boolean probe',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/SIMPLE_TAUTOLOGY'"

# Rule 9943074: Unicode/smart-quote + SQL operator (handles '  – variants)
# Covers: ' – (smart-quote + en-dash as comment indicator)
# '/' (prime/backtick+comment), Unicode apostrophes before SQL tokens.
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?:\xe2\x80[\x98-\x9d\xa6-\xab]|\xc2\xb4)\s*(?:--|or\b|and\b|#|/\*)|[\xe2\x80\x98\xe2\x80\x99][^'\x00-\x1f]{0,80}\xe2\x80\x93" \
    "id:9943074,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 short-probe: Unicode smart-quote + SQL operator/comment',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:WARNING,\
    setvar:'tx.sqli_score_v2=+%{tx.warning_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.warning_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/SMART_QUOTE'"

