# ============================================================================
# SQLi GENERALIZED RULE BASE v2
# Rule ID Range: 9943000-9943099
# Architecture: 5-Layer Defense with Anomaly Scoring
#
# TRIẾT LÝ THIẾT KẾ:
#   - Kết hợp ngữ nghĩa SQL (không chỉ từ khóa riêng lẻ)
#   - Pattern bắt cặp: từ khóa + dấu hiệu injection (quote, comment, tham số)
#   - Phân biệt SQL bình thường trong text vs SQL injection attack
# ============================================================================

SecAction \
    "id:9943000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.sqli_score_v2=0'"

# ============================================================================
# LỚP 1: CLASSIC SQLi - UNION-based + Stacked Queries (CRITICAL)
# ============================================================================

# Rule 9943001: UNION SELECT (core SQL injection)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\bunion\s+(?:all\s+)?select\b" \
    "id:9943001,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: UNION SELECT injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/UNION_SELECT'"

# Rule 9943002: Stacked queries - semicolon + DML/DDL
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i);\s*(?:select\s+\w|insert\s+into\b|update\s+\w+\s+set\b|delete\s+from\b|drop\s+(?:table|database|schema|index)\b|alter\s+table\b|create\s+(?:table|database|user)\b|truncate\b|exec(?:ute)?\s+)" \
    "id:9943002,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Stacked query injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/STACKED'"

# Rule 9943003: Boolean-based injection với quote + OR/AND pattern
# Chỉ bắt khi có quote + logic bypass (không bắt OR/AND bình thường)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:'\s*(?:or|and)\s*'[^']*'\s*=\s*'|'\s*(?:or|and)\s+[\d]+\s*=\s*[\d]+|'\s*(?:or|and)\s+[\d]+--|'\s*or\s+'[^']+'\s*like\s+'|'\s*(?:or|and)\s+'?\btrue\b|'\s*--)" \
    "id:9943003,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L1: Boolean-based authentication bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BOOLEAN_BYPASS'"

# ============================================================================
# LỚP 2: BLIND SQLi - Time-based + Boolean Inference (CRITICAL)
# ============================================================================

# Rule 9943010: Time-based blind SQLi functions
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\b(?:sleep\s*\(\s*\d|benchmark\s*\(\s*\d{4,}|waitfor\s+delay\s+['\"]?\d|pg_sleep\s*\(\s*\d|dbms_pipe\.receive_message)" \
    "id:9943010,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L2: Time-based blind SQLi',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/TIME_BLIND'"

# Rule 9943011: Boolean inference pattern (AND 1=1/1=2 style)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:\band\s+\d+\s*=\s*\d+(?:\s*--|#|\s*$)|\band\s+[\w.]+\s*=\s*[\w.]+\s*--|\bor\s+\d+\s*=\s*\d+(?:\s*--|#|\s*$)|\bxor\s+\d+\s*=\s*\d+)" \
    "id:9943011,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L2: Boolean inference SQLi pattern',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BOOL_INFER'"

# ============================================================================
# LỚP 3: ERROR-BASED SQLi + Out-of-Band (ERROR = 4 điểm)
# ============================================================================

# Rule 9943020: Error-based extraction functions
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\b(?:extractvalue\s*\(|updatexml\s*\(|exp\s*\(\s*~|floor\s*\(\s*rand\s*\(\s*\d|geometrycollection\s*\(|multipoint\s*\(|polygon\s*\(|multipolygon\s*\(|linestring\s*\(|multilinestring\s*\()" \
    "id:9943020,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L3: Error-based SQLi extraction function',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.sqli_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/ERROR_BASED'"

# Rule 9943021: Out-of-band SQLi (DNS/HTTP exfiltration)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:load_file\s*\(\s*(?:'|\")|into\s+(?:out|dump)file\s+(?:'|\")|utl_http\.request|utl_file\.\w+|dbms_ldap\.init|xp_dirtree\s*\(|xp_fileexist\s*\(|sys\.fn_xe_file_target_read_file|openrowset\s*\()" \
    "id:9943021,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L3: Out-of-band SQL injection / file read/write',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:ERROR,\
    setvar:'tx.sqli_score_v2=+%{tx.error_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl3=+%{tx.error_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/OOB'"

# ============================================================================
# LỚP 4: ADVANCED TECHNIQUES + ENCODING (WARNING = 3 điểm)
# ============================================================================

# Rule 9943030: Information schema access
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\b(?:information_schema\s*\.\s*(?:tables|columns|schemata|processlist|user_privileges)|sys(?:databases|objects|columns|tables|users)\b|mysql\.user\b|pg_catalog\.\w+|sqlite_master\b)" \
    "id:9943030,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L4: System catalog / schema enumeration',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:WARNING,\
    setvar:'tx.sqli_score_v2=+%{tx.warning_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.warning_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/SCHEMA_ENUM'"

# Rule 9943031: SQL comment-based obfuscation (MySQL /*!SELECT, inline comment-interleaved)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:/\*![0-9]*\s*(?:select|union|and|or|where|from|order|group|insert|update|delete|drop)\b|s/\*\*/e/\*\*/l/\*\*/e/\*\*/c/\*\*/t)" \
    "id:9943031,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L4: SQL comment-based obfuscation',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:WARNING,\
    setvar:'tx.sqli_score_v2=+%{tx.warning_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.warning_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/COMMENT_OBFUSC'"

# Rule 9943032: Hex-encoded SQL
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:0x(?:53454c454354|494e53455254|44524f50205441424c45|554e494f4e2053454c454354)|char\s*\(\s*(?:115|83)\s*,\s*(?:101|69)\s*,\s*(?:108|76))" \
    "id:9943032,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L4: Hex-encoded SQL keyword',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:WARNING,\
    setvar:'tx.sqli_score_v2=+%{tx.warning_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.warning_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/HEX_ENCODE'"

# ============================================================================
# LỚP 5: HEURISTIC + OS COMMAND / NoSQL (NOTICE = 2 điểm)
# ============================================================================

# Rule 9943040: OS command execution via SQL (xp_cmdshell, etc.)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\b(?:xp_cmdshell\s*\(|sp_executesql\s*\(|exec\s*(?:master|xp_|sp_)\w+|openrowset\s*\(\s*'SQLOLEDB'|sp_oacreate|sp_oamethod|execute\s+as\s+(?:user|login))" \
    "id:9943040,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L5: OS command via SQL stored procedure',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:NOTICE,\
    setvar:'tx.sqli_score_v2=+%{tx.notice_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.notice_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/OS_CMD'"

# Rule 9943041: NoSQL injection patterns
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:\$(?:where|gt|lt|gte|lte|ne|in|nin|regex|exists|type|mod|all|size|elemMatch)\s*[:=]|\{[^}]*\$(?:where|ne|gt|lt|regex)[^}]*\}|;\s*return\s+(?:true|1|this)\s*;|'\s*\|\|\s+')" \
    "id:9943041,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L5: NoSQL injection pattern (MongoDB/etc)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:NOTICE,\
    setvar:'tx.sqli_score_v2=+%{tx.notice_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.notice_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/NOSQL'"

# Rule 9943042: Base64-decoded SQLi
SecRule REQUEST_FILENAME|ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx .+" \
    "id:9943042,\
    phase:2,\
    pass,\
    nolog,\
    capture,\
    t:none,\
    t:urlDecodeUni,\
    t:base64DecodeExt,\
    t:urlDecodeUni,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    setvar:'tx.b64_sqli_%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'"

SecRule TX:/^b64_sqli_/ \
    "@rx (?i)(?:\bunion\s*(?:all\s*)?select|un\s*(?:/\*.{0,80}?\*/\s*)?ion\s*(?:all\s*)?sel\s*(?:/\*.{0,80}?\*/\s*)?ect|/\*!\d*\s*union\s*\*/\s*/\*!\d*\s*select\s*\*/|un(?:\xe2\x80\x8b)?ion\s+se(?:\xe2\x80\x8b)?lect|;\s*(?:drop|select|insert|update|delete|declare|exec|begin|shutdown)\b|\b(?:sleep|benchmark|pg_sleep)\s*\(|\bwaitfor\s+(?:delay|time)\b|\b(?:or|and)\s+\d+\s*=\s*\d+|\b(?:or|and)\s+['\x22][^'\x22\r\n]{0,80}['\x22]\s*=\s*['\x22]|['\x22];\s*--|\b(?:or|and)\s+json_(?:extract|depth|length|type|contains|contains_path|value|query)\s*\(|\bjson_(?:extract|depth|length|type|contains|contains_path|value|query)\s*\(|\b(?:xp_cmdshell|openrowset|sp_makewebtask|information_schema|dba_users|all_users|user_objects)\b|\bselect\b.{0,30}\bfrom\b|\bpg_sleep\b)" \
    "id:9943043,\
    phase:2,\
    t:none,\
    block,\
    msg:'SQLi-v2 L5: Base64-decoded SQL injection',\
    logdata:'Decoded: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BASE64'"

# ============================================================================
# PATCH SET: EXTENDED DETECTION (Added 2026-05-12)
# Addresses FN regression on GoTestWAF SQLi (69 FN) + Adversarial SQLi (226 FN)
# ============================================================================

# Rule 9943050: String-extraction functions applied to DB metadata
# Catches: substring(version(),1,1)=5 / mid(version(),1,1) / left(user(),1)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)\b(?:substring|substr|mid|left|right|lpad|rpad|ascii|ord|hex|unhex|bin)\s*\(\s*(?:version\s*\(\s*\)|user\s*\(\s*\)|database\s*\(\s*\)|schema\s*\(\s*\)|current_user\s*\(\s*\)|session_user\s*\(\s*\)|system_user\s*\(\s*\)|@@\w+)" \
    "id:9943050,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: String-extraction over DB metadata function',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/META_EXTRACT'"

# Rule 9943051: Error-based extraction with any first arg (null/rand/@@var/version())
# Catches: extractvalue(rand(),...) / updatexml(null,...) / NAME_CONST(version(),1)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)\b(?:extractvalue\s*\(\s*(?:null\b|rand\s*\(|@@?\w+|version\s*\(|[a-z_]\w*\s*\(|\d)|updatexml\s*\(\s*(?:null\b|rand\s*\(|@@?\w+|version\s*\(|\d)|name_const\s*\(\s*(?:version\s*\(|@@\w+|user\s*\(|database\s*\())" \
    "id:9943051,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Error-based extraction (any first arg)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/ERROR_EXT'"

# Rule 9943052: Bare OR/AND boolean (with boolean keyword or comment anchor — FP-safe)
# Catches: OR true-- / OR 1=0-- / OR 1=0# / or true (end-of-input) / 'or true
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:(?:['\"`])\s*\bor\b\s+(?:true|false|null)\b|\bor\b\s+\d+\s*=\s*\d+\s*(?:--|#|/\*)|\bor\b\s+\w+\s*=\s*\w+\s*(?:--|#|/\*)|\bor\b\s+(?:true|false|null)\s*(?:--|#))" \
    "id:9943052,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L2: Bare boolean OR with boolean keyword + SQL comment',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BOOL_BARE'"

# Rule 9943053: ORDER BY / GROUP BY / HAVING enumeration
# Catches: ORDER BY 1 / ORDER BY 1,2,3--+ / HAVING 1=0 / GROUP BY 1,2,3--+
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:\b(?:order\s+by|group\s+by)\s+\d+(?:\s*,\s*\d+)*\s*(?:--|#|;|\+|\s*$)|\bhaving\s+\d+\s*(?:=|<>|!=|<|>)\s*\d+)" \
    "id:9943053,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L2: Column enumeration via ORDER/GROUP BY or HAVING',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/SORT_ENUM'"

