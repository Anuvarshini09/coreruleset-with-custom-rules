    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/CRED_BYPASS'"

# Rule 9943057: Inline SQL comment token-splitting (a'and/*g*/456=678 patterns)
# Catches: 'and/*comment*/456=678 / "or/*x*/1=1
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)['\"`]\s*(?:and|or|union|select|having|where)\s*/\*[^*]{0,30}\*/" \
    "id:9943057,\
    phase:2,\
    t:none,\
