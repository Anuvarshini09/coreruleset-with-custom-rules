# ============================================================================
# SQLi GENERALIZED RULE BASE v2
# Rule ID Range: 9943000-9943099
# Kiến trúc: 5-Layer Defense kết hợp Anomaly Scoring
#
# TRIẾT LÝ THIẾT KẾ:
#   - Kết hợp ngữ nghĩa SQL (không chỉ từ khóa riêng lẻ)
#   - Pattern bắt cặp: từ khóa + dấu hiệu injection (quote, comment, tham số)
#   - Phân biệt SQL bình thường trong text vs SQL injection attack
#
# Architecture 5 layer :
#   L1 - CLASSIC SQLi:          UNION / Stacked / Metadata extraction (CRITICAL)
#   L2 - BLIND & BOOLEAN:       Time-based / Boolean inference / Auth bypass (CRITICAL)
#   L3 - ERROR & OUT-OF-BAND:   Error-based extraction / File-DNS exfil (ERROR)
#   L4 - ENCODING & OBFUSC:     Schema enum / Hex / Comment obfuscation (WARNING)
#   L5 - HEURISTIC & MULTI-VEC: OS cmd / NoSQL / Base64 / Short-probe (NOTICE/CRITICAL)
# ============================================================================

SecAction \
    "id:9943000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.sqli_score_v2=0'"

# ============================================================================
# LỚP 1: CLASSIC SQLi - Tín hiệu tấn công cốt lõi (CRITICAL)
# Bắt các kỹ thuật cổ điển: UNION SELECT, stacked queries, boolean auth bypass,
# truy vấn metadata DB, đọc system catalog, DDL/DCL đặc quyền.
# ============================================================================

# Rule 9943001: UNION SELECT - SQL injection cổ điển
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\bunion\s+(?:all\s+)?select\b" \
    "id:9943001,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: UNION SELECT injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/UNION_SELECT'"

# Rule 9943002: Stacked queries - dấu chấm phẩy nối DML/DDL
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i);\s*(?:select\s+\w|insert\s+into\b|update\s+\w+\s+set\b|delete\s+from\b|drop\s+(?:table|database|schema|index)\b|alter\s+table\b|create\s+(?:table|database|user)\b|truncate\b|exec(?:ute)?\s+)" \
    "id:9943002,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Stacked query injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/STACKED'"

# Rule 9943003: Boolean-based với quote + OR/AND - đặc trưng auth bypass cổ điển
# Bắt khi có quote kết hợp logic bypass, không bắt OR/AND bình thường trong text
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:'\s*(?:or|and)\s*'[^']*'\s*=\s*'|'\s*(?:or|and)\s+[\d]+\s*=\s*[\d]+|'\s*(?:or|and)\s+[\d]+--|'\s*or\s+'[^']+'\s*like\s+'|'\s*(?:or|and)\s+'?\btrue\b|'\s*--)" \
    "id:9943003,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L1: Boolean-based authentication bypass',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BOOLEAN_BYPASS'"

# Rule 9943050: Hàm trích chuỗi áp dụng lên metadata DB
# Bắt substring(version(),1,1)=5 / mid(version(),1,1) / left(user(),1)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)\b(?:substring|substr|mid|left|right|lpad|rpad|ascii|ord|hex|unhex|bin)\s*\(\s*(?:version\s*\(\s*\)|user\s*\(\s*\)|database\s*\(\s*\)|schema\s*\(\s*\)|current_user\s*\(\s*\)|session_user\s*\(\s*\)|system_user\s*\(\s*\)|@@\w+)" \
    "id:9943050,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: String-extraction over DB metadata function',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/META_EXTRACT'"

# Rule 9943051: Error-based extraction với tham số đầu bất kỳ
# Bắt extractvalue(rand(),...) / updatexml(null,...) / NAME_CONST(version(),1)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)\b(?:extractvalue\s*\(\s*(?:null\b|rand\s*\(|@@?\w+|version\s*\(|[a-z_]\w*\s*\(|\d)|updatexml\s*\(\s*(?:null\b|rand\s*\(|@@?\w+|version\s*\(|\d)|name_const\s*\(\s*(?:version\s*\(|@@\w+|user\s*\(|database\s*\())" \
    "id:9943051,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Error-based extraction (any first arg)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/ERROR_EXT'"

# Rule 9943054: Truy vấn trực tiếp hàm metadata DB
# Bắt select version() / select current_database() / select @@servername
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\bselect\s+(?:current_(?:database|user|schema|setting|catalog|date|time|timestamp|role)\s*\(\s*\)|version\s*\(\s*\)|user\s*\(\s*\)|database\s*\(\s*\)|schema\s*\(\s*\)|session_user\s*\(\s*\)|system_user\s*\(\s*\)|host_name\s*\(\s*\)|connection_id\s*\(\s*\)|@@\w+)" \
    "id:9943054,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Direct DB metadata function query',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/META_QUERY'"

# Rule 9943055: SELECT từ system catalog / shadow table
# Bắt select * from pg_shadow / sysusers / master..sysservers
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\bselect\s+(?:[^;]{0,80}\s+)?from\s+(?:master\.\.|sys\.\w+|pg_(?:group|shadow|user|tables|stat\w*|catalog|namespace|class)\b|sysusers\b|syscat\.\w+|sysobjects\b|sqlite_master\b|all_(?:users|tables|objects)\b|user_(?:tables|objects)\b|mysql\.user\b)" \
    "id:9943055,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: SELECT from system catalog/shadow table',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/CATALOG_ENUM'"

# Rule 9943058: DDL/DCL đặc quyền (BACKUP, GRANT, REVOKE, ALTER LOGIN)
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\b(?:backup\s+(?:database|log)\b|restore\s+database\b|grant\s+(?:connect|resource|all\s+privileges|select|insert|update|delete|execute|alter|create|drop)\s+(?:to|on)\b|revoke\s+\w+\s+from\b|alter\s+(?:login|user|role)\b|drop\s+(?:login|user|role)\b)" \
    "id:9943058,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Privileged DDL/DCL command (BACKUP/GRANT/REVOKE/ALTER LOGIN)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/PRIV_DDL'"

# Rule 9943060: UNION SELECT đánh lừa - token splitting / double URL encoding
# Yêu cầu cặp UNION+SELECT ngữ nghĩa nên rủi ro FP thấp
SecRule REQUEST_FILENAME|ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx (?i)(?:\bunion\s*(?:all\s*)?select|un\s*(?:/\*.{0,80}?\*/\s*)?ion\s*(?:all\s*)?sel\s*(?:/\*.{0,80}?\*/\s*)?ect|/\*!\d*\s*union\s*\*/\s*/\*!\d*\s*select\s*\*/)" \
    "id:9943060,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Obfuscated UNION SELECT injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/UNION_OBFUSC'"

# Rule 9943063: Stacked T-SQL / DML có comment chèn sau dấu chấm phẩy
SecRule REQUEST_FILENAME|ARGS|REQUEST_COOKIES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx (?i);(?:\s|/\*.{0,80}?\*/)*(?:declare\s+@\w+|begin\b|shutdown\b|exec(?:ute)?\b|select\s+@?\w+\s*=|insert\s+into\b|del\s*(?:/\*.{0,40}?\*/\s*)?ete\s+from\b|delete\s+from\b|drop\s+table\b|commit\b)" \
    "id:9943063,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L1: Stacked SQL batch with comment obfuscation',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/STACKED_COMMENT'"

# ============================================================================
# LỚP 2: BLIND & BOOLEAN SQLi - Suy luận gián tiếp (CRITICAL)
# Bắt các kỹ thuật blind: time-based, boolean inference, auth bypass nâng cao,
# enum cột qua ORDER/GROUP BY, JSON predicate, nested SELECT, credential bypass.
# ============================================================================

# Rule 9943010: Time-based blind SQLi (sleep, benchmark, waitfor delay)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\b(?:sleep\s*\(\s*\d|benchmark\s*\(\s*\d{4,}|waitfor\s+delay\s+['\"]?\d|pg_sleep\s*\(\s*\d|dbms_pipe\.receive_message)" \
    "id:9943010,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L2: Time-based blind SQLi',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/TIME_BLIND'"

# Rule 9943011: Boolean inference dạng AND 1=1 / 1=2
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:\band\s+\d+\s*=\s*\d+(?:\s*--|#|\s*$)|\band\s+[\w.]+\s*=\s*[\w.]+\s*--|\bor\s+\d+\s*=\s*\d+(?:\s*--|#|\s*$)|\bxor\s+\d+\s*=\s*\d+)" \
    "id:9943011,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L2: Boolean inference SQLi pattern',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BOOL_INFER'"

# Rule 9943052: Bare OR/AND boolean kèm keyword/comment anchor (FP-safe)
# Bắt OR true-- / OR 1=0-- / OR 1=0# / or true (cuối input) / 'or true
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:(?:['\"`])\s*\bor\b\s+(?:true|false|null)\b|\bor\b\s+\d+\s*=\s*\d+\s*(?:--|#|/\*)|\bor\b\s+\w+\s*=\s*\w+\s*(?:--|#|/\*)|\bor\b\s+(?:true|false|null)\s*(?:--|#))" \
    "id:9943052,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L2: Bare boolean OR with boolean keyword + SQL comment',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BOOL_BARE'"

# Rule 9943053: Enum cột qua ORDER BY / GROUP BY / HAVING
# Bắt ORDER BY 1 / ORDER BY 1,2,3--+ / HAVING 1=0 / GROUP BY 1,2,3--+
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:\b(?:order\s+by|group\s+by)\s+\d+(?:\s*,\s*\d+)*\s*(?:--|#|;|\+|\s*$)|\bhaving\s+\d+\s*(?:=|<>|!=|<|>)\s*\d+)" \
    "id:9943053,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L2: Column enumeration via ORDER/GROUP BY or HAVING',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/SORT_ENUM'"

# Rule 9943056: Auth bypass dạng credential + SQL comment (admin"-- / admin"# / admin"/*)
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\b(?:admin|root|administrator|sa|sysadmin|guest|system|dba)\b\s*[\"'`]\s*(?:--|#|/\*|;\s)" \
    "id:9943056,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L2: Credential with SQL comment bypass (admin auth bypass)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/CRED_BYPASS'"

# Rule 9943057: Inline comment splitting (a'and/*g*/456=678)
# Bắt: 'and/*comment*/456=678 / "or/*x*/1=1
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)['\"`]\s*(?:and|or|union|select|having|where)\s*/\*[^*]{0,30}\*/" \
    "id:9943057,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L2: Quote + SQL keyword + inline comment splitting',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/COMMENT_SPLIT'"

# Rule 9943061: Boolean SQLi so sánh chuỗi sau OR/AND
# Yêu cầu toán tử logic SQL + so sánh chuỗi / LIKE / BETWEEN / IN SELECT
SecRule REQUEST_FILENAME|ARGS|REQUEST_COOKIES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx (?i)(?:\b(?:or|and)\b\s*(?:/\*.{0,40}?\*/\s*)*(?:\(+\s*)?['\x22][^'\x22\r\n]{0,80}['\x22]\s*(?:=|<>|!=|<|>|like\b|between\b)|['\x22`]\s*\)*\s*\b(?:or|and)\b\s*(?:/\*.{0,40}?\*/\s*)*(?:\(+\s*)?['\x22][^'\x22\r\n]{0,80}['\x22]\s*(?:=|<>|!=|<|>|like\b|between\b)|\b(?:or|and)\b\s+[\w.]+\s*=\s*['\x22][^'\x22\r\n]{1,80}|\b(?:or|and)\b\s+\w+\s+in\s*\(\s*select\b)" \
    "id:9943061,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L2: Boolean string comparison injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BOOL_STRING_COMPARE'"

# Rule 9943062: JSON SQL function dùng làm boolean predicate
# Nhắm vào hàm JSON của DB dùng như predicate, không phải JSON text bình thường
SecRule REQUEST_FILENAME|ARGS|REQUEST_COOKIES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx (?i)\b(?:and|or)\b\s+(?:\d+\s*=\s*\d+\s+\b(?:and|or)\b\s+)?json_(?:extract|depth|length|type|contains|contains_path|value|query)\s*\([^\r\n]{0,240}\)\s*(?:=|!=|<>|<|>|like\b)" \
    "id:9943062,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L2: JSON SQL function predicate injection',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/JSON_PREDICATE'"

# Rule 9943064: Nested SELECT bao quanh hàm inference time-based / JSON
SecRule REQUEST_FILENAME|ARGS|REQUEST_COOKIES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx (?i)\bselect\s*\([^)]{0,120}\)\s*from\s*\(\s*select\s*\(\s*(?:sleep|benchmark|pg_sleep|json_depth|json_extract)\s*\(" \
    "id:9943064,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
    msg:'SQLi-v2 L2: Nested SELECT function inference payload',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/NESTED_SELECT_FUNC'"

# ============================================================================
# LỚP 3: ERROR-BASED & OUT-OF-BAND SQLi (ERROR)
# Bắt kỹ thuật trích dữ liệu qua lỗi DB và kênh ngoài băng (DNS/HTTP/file).
# ============================================================================

# Rule 9943020: Hàm trích dữ liệu qua lỗi DB
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)\b(?:extractvalue\s*\(|updatexml\s*\(|exp\s*\(\s*~|floor\s*\(\s*rand\s*\(\s*\d|geometrycollection\s*\(|multipoint\s*\(|polygon\s*\(|multipolygon\s*\(|linestring\s*\(|multilinestring\s*\()" \
    "id:9943020,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L3: Error-based SQLi extraction function',\
