    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/SIMPLE_TAUTOLOGY'"

# Rule 9943074: Short-probe - Unicode/smart-quote + SQL operator
# Bao gồm: ' – (smart-quote + en-dash dùng làm comment indicator),
