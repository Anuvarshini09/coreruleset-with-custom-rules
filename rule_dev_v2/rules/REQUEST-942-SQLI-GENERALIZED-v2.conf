# Rule 9943073: Short-probe - no-space quote-keyword concatenation + tautology đơn giản
# Bao gồm: 'or'1=1 / 'or'1=1' / or true / or false / like '%' / or 0=0
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:['\x22`]or['\x22`]\d+\s*=\s*\d+|\bor\s+(?:true|false|null)\s*(?:$|\s|--|#)|\blike\s+['\x22`]%['\x22`]\s*(?:$|\s|--|#)|\bor\s+0\s*=\s*0\b|\band\s+1\s*=\s*1\b)" \
    "id:9943073,\
    phase:2,\
