    severity:NOTICE,\
    setvar:'tx.sqli_score_v2=+%{tx.notice_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.notice_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/OS_CMD'"

# Rule 9943041: NoSQL injection (MongoDB / etc.)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_BODY \
    "@rx (?i)(?:\$(?:where|gt|lt|gte|lte|ne|in|nin|regex|exists|type|mod|all|size|elemMatch)\s*[:=]|\{[^}]*\$(?:where|ne|gt|lt|regex)[^}]*\}|;\s*return\s+(?:true|1|this)\s*;|'\s*\|\|\s+')" \
    "id:9943041,\
    phase:2,\
