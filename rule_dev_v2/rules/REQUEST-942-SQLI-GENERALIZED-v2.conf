# Catches: select * from pg_shadow / select * from sysusers / select * from master..sysservers
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\bselect\s+(?:[^;]{0,80}\s+)?from\s+(?:master\.\.|sys\.\w+|pg_(?:group|shadow|user|tables|stat\w*|catalog|namespace|class)\b|sysusers\b|syscat\.\w+|sysobjects\b|sqlite_master\b|all_(?:users|tables|objects)\b|user_(?:tables|objects)\b|mysql\.user\b)" \
    "id:9943055,\
