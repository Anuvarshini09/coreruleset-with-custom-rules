    tag:'OWASP_CRS/SQLi-v2/STACKED_COMMENT'"

# Rule 9943064: Nested SELECT function invocation used for time/JSON inference.
SecRule REQUEST_FILENAME|ARGS|REQUEST_COOKIES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx (?i)\bselect\s*\([^)]{0,120}\)\s*from\s*\(\s*select\s*\(\s*(?:sleep|benchmark|pg_sleep|json_depth|json_extract)\s*\(" \
    "id:9943064,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    block,\
