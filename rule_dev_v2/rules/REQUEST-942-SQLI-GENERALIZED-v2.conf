    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/EMPTY_STR_TAUTOLOGY'"

# Rule 9943072: Short-probe - nested-paren boolean auth bypass
# Bao gồm: ') or ('x')=('x  ')) or (('x'))=(('x  ") or ("x")=("x
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\)+\s*or\s*\(+['\x22`][^'\x22`\r\n]{0,30}['\x22`]\)+\s*=\s*\(+['\x22`][^'\x22`\r\n]{0,30}['\x22`]" \
