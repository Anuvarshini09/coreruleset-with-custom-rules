    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L5: NoSQL injection pattern (MongoDB/etc)',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:NOTICE,\
    setvar:'tx.sqli_score_v2=+%{tx.notice_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl4=+%{tx.notice_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/NOSQL'"

# Rule 9943042 + 9943043: Cặp detect-decode Base64 SQLi
# Bước 1 (9943042): decode Base64 và lưu vào biến tx.b64_sqli_*
# Bước 2 (9943043): kiểm tra nội dung đã decode có khớp pattern SQLi không
SecRule REQUEST_FILENAME|ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS|REQUEST_BODY \
    "@rx .+" \
    "id:9943042,\
    phase:2,\
    pass,\
    nolog,\
    capture,\
    t:none,\
    t:urlDecodeUni,\
    t:base64DecodeExt,\
    t:urlDecodeUni,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    setvar:'tx.b64_sqli_%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'"

SecRule TX:/^b64_sqli_/ \
    "@rx (?i)(?:\bunion\s*(?:all\s*)?select|un\s*(?:/\*.{0,80}?\*/\s*)?ion\s*(?:all\s*)?sel\s*(?:/\*.{0,80}?\*/\s*)?ect|/\*!\d*\s*union\s*\*/\s*/\*!\d*\s*select\s*\*/|un(?:\xe2\x80\x8b)?ion\s+se(?:\xe2\x80\x8b)?lect|;\s*(?:drop|select|insert|update|delete|declare|exec|begin|shutdown)\b|\b(?:sleep|benchmark|pg_sleep)\s*\(|\bwaitfor\s+(?:delay|time)\b|\b(?:or|and)\s+\d+\s*=\s*\d+|\b(?:or|and)\s+['\x22][^'\x22\r\n]{0,80}['\x22]\s*=\s*['\x22]|['\x22];\s*--|\b(?:or|and)\s+json_(?:extract|depth|length|type|contains|contains_path|value|query)\s*\(|\bjson_(?:extract|depth|length|type|contains|contains_path|value|query)\s*\(|\b(?:xp_cmdshell|openrowset|sp_makewebtask|information_schema|dba_users|all_users|user_objects)\b|\bselect\b.{0,30}\bfrom\b|\bpg_sleep\b)" \
    "id:9943043,\
    phase:2,\
    t:none,\
    block,\
    msg:'SQLi-v2 L5: Base64-decoded SQL injection',\
    logdata:'Decoded: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/BASE64'"

# Rule 9943070: Short-probe - quote ngay liền sau là SQL comment terminator
# Bao gồm: '#  '/*  '-- " -- " # (bỏ stripping còn lại quote+comment)
# Độ tin cậy cao: quote+comment ở đầu/cuối giá trị = đầu dò auth bypass
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)(?:^|[\s=&,])['\"`]\s*(?:--|#|/\*)\s*(?:$|[\s\-#])" \
    "id:9943070,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 short-probe: quote + SQL comment terminator',\
    logdata:'Matched: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/QUOTE_COMMENT'"

# Rule 9943071: Short-probe - quote-empty-string-tautology sandwich
# Bao gồm: ' or ''-' / ' or '' ' / ' or ''*' / " or ""&" (tautology dựa trên ký tự)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)['\"`]\s*(?:or|and)\s*['\"`]{2,}[-+&*^'\x20\t]" \
    "id:9943071,\
