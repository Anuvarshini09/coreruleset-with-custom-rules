SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\bselect\s+(?:current_(?:database|user|schema|setting|catalog|date|time|timestamp|role)\s*\(\s*\)|version\s*\(\s*\)|user\s*\(\s*\)|database\s*\(\s*\)|schema\s*\(\s*\)|session_user\s*\(\s*\)|system_user\s*\(\s*\)|host_name\s*\(\s*\)|connection_id\s*\(\s*\)|@@\w+)" \
