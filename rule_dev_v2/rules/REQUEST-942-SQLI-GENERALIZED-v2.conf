    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/COMMENT_OBFUSC'"

# Rule 9943032: Hex-encoded SQL keyword (0x53454c454354 = SELECT)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:0x(?:53454c454354|494e53455254|44524f50205441424c45|554e494f4e2053454c454354)|char\s*\(\s*(?:115|83)\s*,\s*(?:101|69)\s*,\s*(?:108|76))" \
    "id:9943032,\
