# Rule 9943031: Comment-based obfuscation (MySQL /*!SELECT, inline interleaved)
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_HEADERS:Referer|REQUEST_BODY \
    "@rx (?i)(?:/\*![0-9]*\s*(?:select|union|and|or|where|from|order|group|insert|update|delete|drop)\b|s/\*\*/e/\*\*/l/\*\*/e/\*\*/c/\*\*/t)" \
