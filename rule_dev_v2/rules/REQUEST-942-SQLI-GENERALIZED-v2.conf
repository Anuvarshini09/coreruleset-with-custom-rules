    setvar:'tx.sqli_score_v2=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    tag:'attack-sqli',\
    tag:'OWASP_CRS/SQLi-v2/CATALOG_ENUM'"

# Rule 9943056: Credential field + SQL comment bypass (admin"-- / admin"# / admin"/*")
# Catches authentication bypass via double-quote close + comment
SecRule ARGS|REQUEST_COOKIES|REQUEST_BODY \
    "@rx (?i)\b(?:admin|root|administrator|sa|sysadmin|guest|system|dba)\b\s*[\"'`]\s*(?:--|#|/\*|;\s)" \
    "id:9943056,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:removeNulls,\
    block,\
    msg:'SQLi-v2 L2: Credential with SQL comment bypass (admin auth bypass)',\
